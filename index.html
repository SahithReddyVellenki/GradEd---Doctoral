function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}

function computeGfrStatus(r){
  if(r.status==='Active'&&r.grad_dt&&new Date(r.grad_dt)<=new Date())return'Free';
  return r.status;
}
function withLive(r){
  var ls=computeGfrStatus(r);
  return Object.assign({},r,{liveStatus:ls,displayStudent:ls==='Active'?r.current_student:'',displayGrad:ls==='Active'?r.grad_expected:'',displayProgram:ls==='Active'?r.program:'',displayStudentCollege:ls==='Active'?r.current_student_college:''});
}

function parseGradDate(defenseDate,anticipatedGrad){
  if(defenseDate){
    var m=String(defenseDate).match(/(\d{1,2})\.(\d{1,2})\.(\d{2,4})/);
    if(m){var yr=parseInt(m[3]);if(yr<100)yr+=2000;var d=new Date(yr,parseInt(m[1])-1,parseInt(m[2]));if(!isNaN(d.getTime()))return d.toISOString().slice(0,10);}
    if(String(defenseDate).match(/^\d{4}-\d{2}-\d{2}$/))return String(defenseDate);
  }
  if(anticipatedGrad){
    var t=String(anticipatedGrad).trim().toLowerCase();
    var yr2=t.match(/(\d{4})/);if(!yr2)return null;
    var year=parseInt(yr2[1]);
    if(t.includes('spring'))return year+'-06-01';
    if(t.includes('summer'))return year+'-09-01';
    if(t.includes('fall'))return(year+1)+'-01-15';
  }
  return null;
}

function buildBackupFilename(){
  var now=new Date();
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return'GFR_Tracking_'+months[now.getMonth()]+'-'+now.getFullYear()+'_'+(now.getDate()<=15?'1':'2')+'.csv';
}
function buildCSV(records, requests, students){
  // === Sheet 1: GFR Faculty Roster ===
  var rows=[['=== GFR FACULTY ROSTER ===']];
  rows.push(['Professor','College','Department','Academic Title','Status','Has Pending Request','Current Student','Student College','Grad Expected','Program','Decline Count','Notes','Last Updated']);
  var today=new Date().toLocaleDateString();
  (records||[]).forEach(function(r){
    rows.push([r.name||'',r.college||'',r.department||'',r.title||'',r.liveStatus||'',
      r.hasPendingRequest?'Yes':'No',r.displayStudent||'',r.displayStudentCollege||'',
      r.displayGrad||'',r.displayProgram||'',r.declineCount||0,r.notes||'',today]);
  });

  // === Sheet 2: Doctoral Students ===
  rows.push([]);
  rows.push(['=== DOCTORAL STUDENTS ===']);
  rows.push(['Last Name','First Name','Full Name','Student ID','College','Degree','Program','Department',
    'Coordinator','Dept Chair','Academic Advisor','Entry Date','Anticipated Grad',
    'Chair','Co-Chair','Committee Members','GFR','External Member',
    'Proposal Date','Defense Date','Dissertation Title',
    'Form A','Form B','Form C','Form D','Form E','Form F','Form G','Form H','Form K',
    'Candidacy Letter','GFR Letter Date','Comments','Email']);
  (students||[]).forEach(function(s){
    rows.push([s.last_name||'',s.first_name||'',s.full_name||'',s.student_id||'',
      s.college_code||'',s.degree||'',s.program_name||s.major||'',s.department||'',
      s.coordinator||'',s.dept_chair||'',s.academic_advisor||'',s.entry_date||'',
      s.anticipated_grad||'',s.chair||'',s.cochair||'',s.committee_members||'',
      s.gfr||'',s.external_member||'',s.proposal_date||'',s.defense_date||'',
      s.dissertation_title||'',s.form_a||'',s.form_b||'',s.form_c||'',s.form_d||'',
      s.form_e||'',s.form_f||'',s.form_g||'',s.form_h||'',s.form_k||'',
      s.candidacy_letter_date||'',s.gfr_letter_date||'',s.comments||'',s.email||'']);
  });

  // === Sheet 3: GFR Requests Log ===
  rows.push([]);
  rows.push(['=== GFR REQUESTS LOG ===']);
  rows.push(['Student','College','Program','GFR Name','GFR College','Status','Sent Date','Deadline','Chair','Dissertation']);
  (requests||[]).forEach(function(rq){
    rows.push([rq.student_name||'',rq.student_college||'',rq.student_program||'',
      rq.gfr_name||'',rq.gfr_college||'',rq.status||'',
      rq.sent_at?new Date(rq.sent_at).toLocaleDateString():'',
      rq.deadline?new Date(rq.deadline).toLocaleDateString():'',
      rq.chair||'',rq.dissertation||'']);
  });

  return rows.map(function(row){
    return row.map(function(c){return '"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');
  }).join('\r\n');
}

function exportCSV(records, requests, students){
  var csv=buildCSV(records,requests,students);
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=buildBackupFilename();
  a.click();URL.revokeObjectURL(a.href);
}

async function backupToSharePoint(records, requests, students, notify){
  var csv=buildCSV(records,requests,students);
  var fileName=buildBackupFilename();
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var uploadUrl=SP_SITE+'/_api/web/GetFolderByServerRelativeUrl(\''+SP_BACKUP_FOLDER+'\')/Files/add(url=\''+fileName+'\',overwrite=true)';
  try{
    var dr=await fetch(SP_SITE+'/_api/contextinfo',{method:'POST',
      headers:{'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose'},
      credentials:'include'});
    if(!dr.ok)throw new Error('Not logged in to SharePoint');
    var digest=(await dr.json()).d.GetContextWebInformation.FormDigestValue;
    var ab=await blob.arrayBuffer();
    var ur=await fetch(uploadUrl,{method:'POST',
      headers:{'Accept':'application/json;odata=verbose','X-RequestDigest':digest},
      credentials:'include',body:ab});
    if(ur.ok){
      localStorage.setItem(LAST_BACKUP_KEY,new Date().toISOString());
      notify('✅ Backup saved to SharePoint: '+fileName+' (GFR faculty + '+  (students||[]).length+' students + requests)');
      return true;
    }
    throw new Error('Upload failed: '+ur.status);
  }catch(e){
    exportCSV(records,requests,students);
    window.open(SP_SITE+'/Shared%20Documents/Forms/AllItems.aspx','_blank');
    localStorage.setItem(LAST_BACKUP_KEY,new Date().toISOString());
    notify('📁 Downloaded '+fileName+' (includes all students & GFR data) — upload to SharePoint GFR Backups folder','warning');
    return false;
  }
}

function shouldAutoBackup(){var last=localStorage.getItem(LAST_BACKUP_KEY);if(!last)return true;return(Date.now()-new Date(last).getTime())/86400000>=BACKUP_INTERVAL_DAYS;}

var COLLEGE_MAP={'COEHD':'College of Education & Human Development','COSN':'College of Science','CECS':'College of Engineering & Computer Science','CONHS':'College of Nursing & Health Sciences','COB':'College of Business','COLA':'College of Liberal Arts','SAMC':'School of Arts, Media & Communication'};

function toDbPatch(obj){return Object.fromEntries(DB_GFR_FIELDS.filter(function(k){return k in obj;}).map(function(k){return[k,obj[k]];}));}

var _programs=[];var _advisors=[];var _departments=[];
function lookupProgram(code){return _programs.find(function(p){return p.code===code;})||null;}
function lookupAdvisor(collegeCode,lastName){
  if(!lastName||!collegeCode)return'';
  var first=lastName.trim()[0].toUpperCase();
  var a=_advisors.find(function(a){return a.college_code===collegeCode&&first>=a.last_name_start&&first<=a.last_name_end;});
  return a?a.advisor_name:'';
}
function lookupDept(name){return _departments.find(function(d){return d.name===name;})||null;}

          </div>
        </div>
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',padding:'8px 20px 0'}}>
          <div style={{fontSize:11,color:'#9ca3af',textTransform:'uppercase',marginBottom:4}}>Email Preview — edit if needed</div>
          <textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)}
            style={{flex:1,padding:12,border:'1.5px solid #e5e7eb',borderRadius:8,fontSize:12,fontFamily:"'DM Mono','Courier New',monospace",lineHeight:1.7,resize:'none',color:'#374151',minHeight:200}}/>
        </div>
        <div style={{padding:12,borderTop:'1px solid #e5e7eb',display:'flex',gap:8}}>
          <button onClick={send} disabled={sending} className="btn btn-g" style={{flex:2,justifyContent:'center',opacity:sending?0.7:1}}>
            {sending?'Sending…':'✓ Log Request to '+candidate.name}
          </button>
          <button onClick={()=>window.location.href='mailto:?subject='+encodeURIComponent('GFR Request – '+(studentInfo?.student_name||''))+'&body='+encodeURIComponent(emailBody)} className="btn btn-b" style={{flex:1,justifyContent:'center'}}>📧 Outlook</button>
          <button onClick={()=>navigator.clipboard.writeText(emailBody)} className="btn btn-o" style={{flex:1,justifyContent:'center'}}>📋 Copy</button>
          <button onClick={onSkip} className="btn btn-o" style={{flex:1,justifyContent:'center',color:'#9ca3af'}}>Skip →</button>
        </div>
      </div>
    </div>
  );
}

// ── Shared field component ───────────────────────────────────────────────────
function Field({label,value,onChange,type='text',options,readOnly,rows,placeholder}){
  return(
    <div>
      <label className="fl">{label}</label>
      {readOnly
        ?<span className="fa">{value||'—'}</span>
        :options
          ?<select className="fi" value={value||''} onChange={e=>onChange(e.target.value)}>
            <option value="">— select —</option>
            {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
          </select>
          :rows
            ?<textarea className="fi" value={value||''} onChange={e=>onChange(e.target.value)} rows={rows} style={{resize:'vertical'}}/>
            :<input className="fi" type={type} value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder||''}/>
      }
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('committee');
  const [gfrData,setGfrData]=useState([]);
  const [requests,setRequests]=useState([]);
  const [students,setStudents]=useState([]);
  const [programs,setPrograms]=useState([]);
  const [advisors,setAdvisors]=useState([]);
  const [departments,setDepartments]=useState([]);
  const [loading,setLoading]=useState(true);
  const [seeding,setSeeding]=useState(false);
  const [seedProg,setSeedProg]=useState('');
  const [error,setError]=useState(null);
  const [notif,setNotif]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [backingUp,setBackingUp]=useState(false);
  const [showBackupModal,setShowBackupModal]=useState(false);
  const [nextPopup,setNextPopup]=useState(null);
  const [confirmDlg,setConfirmDlg]=useState(null);
  const autoBackupDone=useRef(false);

  const notify=(msg,type='success')=>{setNotif({msg,type});setTimeout(()=>setNotif(null),4500);};
  const confirm=(msg,cb)=>setConfirmDlg({msg,cb});

  const gfrWithPending=useMemo(()=>{
    const ids=new Set(requests.filter(r=>r.status==='pending').map(r=>String(r.gfr_id)));
    const declinedMap={};
    requests.filter(r=>['declined','no_response'].includes(r.status)).forEach(r=>{
      declinedMap[String(r.gfr_id)]=(declinedMap[String(r.gfr_id)]||0)+1;
    });
    return gfrData.map(r=>({...r,hasPendingRequest:ids.has(String(r.id)),declineCount:declinedMap[String(r.id)]||0}));
  },[gfrData,requests]);

  const loadData=useCallback(async()=>{
    try{
      setLoading(true);setError(null);
      const [gfrs,reqs,studs,progs,advs,depts]=await Promise.all([
        sbGet('gfr_roster','order=name.asc&limit=1000'),
        sbGet('gfr_requests','order=created_at.desc&limit=1000'),
        sbGet('students','order=last_name.asc&limit=1000'),
        sbGet('programs','order=name.asc'),
        sbGet('advisors','order=college_code.asc'),
        sbGet('departments','order=name.asc'),
      ]);
      setGfrData(gfrs.map(withLive));
      setRequests(reqs);
      setStudents(studs);
      setPrograms(progs);
      setAdvisors(advs);
      setDepartments(depts);
      // Update global caches
      _programs=progs;_advisors=advs;_departments=depts;
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{
    if(!loading&&(gfrData.length>0||students.length>0)&&!autoBackupDone.current&&typeof shouldAutoBackup==="function"&&shouldAutoBackup()){
      autoBackupDone.current=true;
      setTimeout(()=>setShowBackupModal(true),1500);
    }
  },[loading,gfrData,students]);

  const seedTable=async(which)=>{
    if(!confirm('Load seed data into Supabase? Only do this once.'))return;
    setSeeding(true);
    try{
      if(which==='gfr'||which==='all'){
        for(let i=0;i<SEED_DATA.length;i+=50){
          const chunk=SEED_DATA.slice(i,i+50).map(r=>({name:r.name||'',college:r.college||'',title:r.title||'',department:r.department||'',notes:r.notes||'',status:r.status||'Free',current_student:r.current_student||'',current_student_college:r.current_student_college||'',grad_expected:r.grad_expected||'',grad_dt:r.grad_dt||null,program:r.program||''}));
          setSeedProg('Loading GFR faculty... '+Math.min(i+50,SEED_DATA.length)+' / '+SEED_DATA.length);
          await sbPost('gfr_roster',chunk);
        }
      }
      if(which==='students'||which==='all'){
        for(let i=0;i<STUDENTS_DATA.length;i+=50){
          setSeedProg('Loading students... '+Math.min(i+50,STUDENTS_DATA.length)+' / '+STUDENTS_DATA.length);
          await sbPost('students',STUDENTS_DATA.slice(i,i+50));
        }
      }
      setSeeding(false);setSeedProg('');
      notify('Loaded all data successfully!');
      await loadData();
    }catch(e){setSeeding(false);setSeedProg('');notify('Seeding failed: '+e.message,'error');}
  };

  useEffect(()=>{loadData();},[loadData]);

  // ── GFR operations ─────────────────────────────────────────────────────────
  const updateGFR=useCallback(async(id,patch)=>{
    try{
      const clean=toDbPatch(patch);
      const updated=await sbPatch('gfr_roster',id,clean);
      setGfrData(prev=>prev.map(r=>r.id===id?withLive({...r,...clean,...(updated[0]||{})}):r));
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[]);

  const appendGfrNote=useCallback(async(gfr,text)=>{
    if(!gfr||!text)return;
    const existing=(gfr.notes||'').trim();
    await updateGFR(gfr.id,{name:gfr.name,college:gfr.college,title:gfr.title,department:gfr.department,status:gfr.status,current_student:gfr.current_student||'',current_student_college:gfr.current_student_college||'',grad_expected:gfr.grad_expected||'',grad_dt:gfr.grad_dt||null,program:gfr.program||'',notes:existing?existing+'\n'+text:text});
  },[updateGFR]);

  const addGFR=useCallback(async(rec)=>{
    try{const res=await sbPost('gfr_roster',[rec]);if(res&&res[0])setGfrData(prev=>[...prev,withLive(res[0])].sort((a,b)=>a.name.localeCompare(b.name)));notify('Added '+rec.name);}
    catch(e){notify('Add failed: '+e.message,'error');}
  },[]);

  const deleteGFR=useCallback((id,name)=>{
    confirm('Delete '+name+' from the GFR roster? This cannot be undone.',async()=>{
      try{await sbDelete('gfr_roster',id);setGfrData(prev=>prev.filter(r=>r.id!==id));notify('Deleted '+name);setConfirmDlg(null);}
      catch(e){notify('Delete failed: '+e.message,'error');setConfirmDlg(null);}
    });
  },[]);

  // ── Student operations ─────────────────────────────────────────────────────
  const updateStudent=useCallback(async(id,patch)=>{
    try{
      const {id:_id,created_at:_ca,...cleanPatch}=patch;
      const updated=await sbPatch('students',id,cleanPatch);
      setStudents(prev=>prev.map(s=>s.id===id?{...s,...cleanPatch,...(updated[0]||{})}:s));
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[]);

  const addStudent=useCallback(async(rec)=>{
    try{const res=await sbPost('students',[rec]);if(res&&res[0])setStudents(prev=>[...prev,res[0]].sort((a,b)=>a.last_name.localeCompare(b.last_name)));notify('Added '+rec.full_name);}
    catch(e){notify('Add failed: '+e.message,'error');}
  },[]);

  const deleteStudent=useCallback((id,name)=>{
    confirm('Delete student '+name+'? This cannot be undone.',async()=>{
      try{await sbDelete('students',id);setStudents(prev=>prev.filter(s=>s.id!==id));notify('Deleted '+name);setConfirmDlg(null);}
      catch(e){notify('Delete failed: '+e.message,'error');setConfirmDlg(null);}
    });
  },[]);

  // ── Request operations ─────────────────────────────────────────────────────
  const addRequest=useCallback(async(req)=>{
    try{const res=await sbPost('gfr_requests',[req]);if(res&&res[0])setRequests(prev=>[res[0],...prev]);return res&&res[0];}
    catch(e){notify('Request save failed: '+e.message,'error');return null;}
  },[]);

  const patchRequest=useCallback(async(id,patch)=>{
    try{await sbPatch('gfr_requests',id,patch);setRequests(prev=>prev.map(r=>r.id===id?{...r,...patch}:r));}
    catch(e){notify('Update failed: '+e.message,'error');}
  },[]);

  const handleAccept=useCallback(async(req)=>{
    const gfr=gfrData.find(r=>String(r.id)===String(req.gfr_id));
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const note='Accepted GFR request for '+req.student_name+' on '+today;

    // Find the student record to pull authoritative data from students tab
    const student=students.find(s=>
      s.full_name===req.student_name||
      (s.first_name+' '+s.last_name)===req.student_name||
      s.full_name===(req.student_name)
    );
    const gradExpected=student?student.anticipated_grad||req.grad_expected||'':req.grad_expected||'';
    const studentCollege=student?student.college_code||req.student_college||'':req.student_college||'';
    const studentProgram=student?student.program_name||student.major||req.student_program||'':req.student_program||'';
    const gradDt=parseGradDate(student?student.defense_date||'':req.grad_expected||'',gradExpected);

    // 1. Update GFR professor → Active with student info from students tab
    if(gfr){
      const existing=(gfr.notes||'').trim();
      await updateGFR(gfr.id,{
        name:gfr.name,college:gfr.college,title:gfr.title,department:gfr.department,
        grad_dt:gradDt||gfr.grad_dt||null,
        status:'Active',
        current_student:req.student_name||'',
        current_student_college:studentCollege,
        grad_expected:gradExpected,
        program:studentProgram,
        notes:existing?existing+'\n'+note:note
      });
    }

    // 2. Update student record → gfr = professor name (remove "(pending)")
    if(student){
      await updateStudent(student.id,{gfr:req.gfr_name});
    } else {
      // fallback: find by matching name substring
      const stuByName=students.find(s=>s.full_name&&s.full_name.toLowerCase().includes(req.student_name.toLowerCase().split(',')[0]));
      if(stuByName) await updateStudent(stuByName.id,{gfr:req.gfr_name});
    }

    await patchRequest(req.id,{status:'accepted'});
    notify('✅ '+req.gfr_name+' accepted — GFR faculty and student record updated');
  },[gfrData,students,updateGFR,updateStudent,patchRequest]);

  const handleDecline=useCallback(async(req,outcome)=>{
    const gfr=gfrData.find(r=>String(r.id)===String(req.gfr_id));
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const note=outcome==='declined'?'Declined GFR request for '+req.student_name+' on '+today:'No response to GFR request for '+req.student_name+' on '+today+' (48hr passed)';
    await patchRequest(req.id,{status:outcome==='declined'?'declined':'no_response'});
    if(gfr)await appendGfrNote(gfr,note);
    // Clear student's pending GFR text so they show as needing GFR again
    const student=students.find(s=>s.full_name===req.student_name);
    if(student&&(student.gfr||'').includes('(pending)')){
      await updateStudent(student.id,{gfr:''});
    }
    notify((outcome==='declined'?'❌ Declined':'⏰ No reply')+' — finding next candidate…','warning');
    // Build next candidate pool
    const tried=new Set(requests.filter(r=>r.student_name===req.student_name&&(r.status==='pending'||r.status==='declined'||r.status==='no_response')).map(r=>String(r.gfr_id)));
    tried.add(String(req.gfr_id));
    const pool=shuffle(gfrData.filter(r=>r.liveStatus==='Free'&&r.college!==req.student_college&&!tried.has(String(r.id))));
    if(pool.length===0){notify('No more candidates available. Use Find GFR tab.','error');return;}
    setNextPopup({candidates:pool,currentIdx:0,studentInfo:{student_name:req.student_name,student_college:req.student_college,student_program:req.student_program,dissertation:req.dissertation,chair:req.chair||'',cochair:req.cochair||'',grad_expected:req.grad_expected||''}});
  },[gfrData,requests,patchRequest,appendGfrNote]);

  const handleNextSend=useCallback(async(candidate,emailBody)=>{
    if(!nextPopup)return;
    const si=nextPopup.studentInfo;
    const req={gfr_id:String(candidate.id),gfr_name:candidate.name,gfr_college:candidate.college,student_name:si.student_name,student_college:si.student_college,student_program:si.student_program,dissertation:si.dissertation,chair:si.chair||'',cochair:si.cochair||'',grad_expected:si.grad_expected||'',email_body:emailBody,sent_at:new Date().toISOString(),deadline:new Date(Date.now()+48*3600000).toISOString(),status:'pending'};
    const saved=await addRequest(req);
    if(saved){notify('Request sent to '+candidate.name);setNextPopup(null);}
  },[nextPopup,addRequest]);

  const handleNextSkip=useCallback(()=>{
    setNextPopup(prev=>{
      if(!prev)return null;
      const next=prev.currentIdx+1;
      if(next>=prev.candidates.length){notify('No more candidates. Try Find GFR tab.','error');return null;}
      return{...prev,currentIdx:next};
    });
  },[]);

  // ── Settings operations ────────────────────────────────────────────────────
  const updateProgram=useCallback(async(id,patch)=>{
    try{
      await sbPatch('programs',id,patch);
      setPrograms(prev=>prev.map(p=>p.id===id?{...p,...patch}:p));
      _programs=programs.map(p=>p.id===id?{...p,...patch}:p);
      // Cascade to all students in this program
      const prog=programs.find(p=>p.id===id);
      if(prog){
        const toUpdate=students.filter(s=>s.major===prog.code);
        for(const s of toUpdate){
          const updates={};
          if(patch.coordinator)updates.coordinator=patch.coordinator;
          if(patch.department)updates.department=patch.department;
          if(patch.college_name)updates.college_name=patch.college_name;
          if(Object.keys(updates).length>0)await sbPatch('students',s.id,updates);
        }
        if(Object.keys({}).length>0)await loadData();
        else setStudents(prev=>prev.map(s=>s.major===prog.code?{...s,...(patch.coordinator?{coordinator:patch.coordinator}:{}), ...(patch.department?{department:patch.department}:{})}:s));
      }
      notify('Program updated');
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[programs,students,loadData]);

  const updateDepartment=useCallback(async(id,patch)=>{
    try{
      await sbPatch('departments',id,patch);
      setDepartments(prev=>prev.map(d=>d.id===id?{...d,...patch}:d));
      // Cascade chair to students
      const dept=departments.find(d=>d.id===id);
      if(dept&&patch.chair){
        const toUpdate=students.filter(s=>s.department===dept.name);
        for(const s of toUpdate)await sbPatch('students',s.id,{dept_chair:patch.chair});
        setStudents(prev=>prev.map(s=>s.department===dept.name?{...s,dept_chair:patch.chair}:s));
      }
      notify('Department updated');
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[departments,students]);

  const updateAdvisor=useCallback(async(id,patch)=>{
    try{
      await sbPatch('advisors',id,patch);
      setAdvisors(prev=>prev.map(a=>a.id===id?{...a,...patch}:a));
      _advisors=advisors.map(a=>a.id===id?{...a,...patch}:a);
      notify('Advisor updated');
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[advisors]);

  const handleBackup=async(fromModal=false)=>{
    setBackingUp(true);
    await backupToSharePoint(gfrWithPending,requests,students,notify);
    setBackingUp(false);
    if(fromModal)setShowBackupModal(false);
  };

  const stats=useMemo(()=>({
    total:gfrData.length,
    free:gfrData.filter(r=>r.liveStatus==='Free').length,
    active:gfrData.filter(r=>r.liveStatus==='Active').length,
    pending:requests.filter(r=>r.status==='pending').length,
    students:students.length,
    needsGFR:students.filter(s=>!s.gfr).length,
  }),[gfrData,requests,students]);

  const backupDue=typeof shouldAutoBackup==="function"?shouldAutoBackup():false;
  const lastBackup=localStorage.getItem(LAST_BACKUP_KEY);
  const gfrEmpty=gfrData.length===0;
  const studentsEmpty=students.length===0;

  if(loading)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16}}><div style={{width:40,height:40,border:'3px solid #e5e7eb',borderTop:'3px solid #059669',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/><div style={{color:'#6b7280',fontSize:14}}>Connecting to database...</div></div>);

  if(error)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16,padding:32,textAlign:'center'}}><div style={{fontSize:40}}>⚠️</div><div style={{fontWeight:600,fontSize:16}}>Could not connect</div><div style={{color:'#6b7280',fontSize:13,maxWidth:500,lineHeight:1.7}}>{error}</div><div style={{background:'#f8f7f4',borderRadius:8,padding:'12px 20px',fontSize:12,maxWidth:500,textAlign:'left'}}><strong>Fix:</strong> Go to Supabase → SQL Editor → run the setup SQL files, then refresh.</div><button onClick={loadData} className="btn btn-p" style={{marginTop:8}}>↻ Retry</button></div>);

  return(
    <div style={{fontFamily:"'DM Sans','Helvetica Neue',sans-serif",background:'#f5f4f0',minHeight:'100vh'}}>
      {/* Header */}
      <div style={{background:'#1a1a2e',height:56,display:'flex',alignItems:'center',padding:'0 24px',gap:12,boxShadow:'0 2px 12px rgba(0,0,0,0.3)'}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:'#10b981',flexShrink:0}}/>
        <span style={{color:'#fff',fontWeight:600,fontSize:14,letterSpacing:'0.03em',flexShrink:0}}>GradEd</span>
        <span style={{color:'#475569',fontSize:11,flexShrink:0}}>Doctoral Students · TAMUCC</span>
        <div style={{display:'flex',gap:2,marginLeft:'auto',flexWrap:'nowrap'}}>
          {[['committee','📋 Students'],['faculty','🎓 GFR Faculty'],['tracking','🔄 Requests'],['settings','⚙️ Settings']].map(([v,label])=>(
            <button key={v} onClick={()=>setView(v)} className="btn"
              style={{background:view===v?'#10b981':'transparent',color:view===v?'#fff':'#94a3b8',padding:'5px 12px',fontSize:12}}>
              {label}
              {v==='tracking'&&stats.pending>0&&<span style={{background:'#ef4444',color:'#fff',borderRadius:10,padding:'1px 5px',fontSize:10,marginLeft:4}}>{stats.pending}</span>}
            </button>
          ))}
        </div>
        <button onClick={loadData} className="btn" style={{background:'transparent',color:'#94a3b8',padding:'5px 8px',fontSize:16,flexShrink:0}} title="Refresh">↻</button>
      </div>

      {/* Toast notification - bottom right */}
      {notif&&<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:notif.type==='success'?'#059669':notif.type==='warning'?'#d97706':'#ef4444',color:'#fff',padding:'10px 16px',borderRadius:8,fontSize:13,fontWeight:500,boxShadow:'0 4px 16px rgba(0,0,0,0.2)',animation:'slideIn 0.2s ease',maxWidth:420}}>{notif.msg}</div>}

      {/* Modals */}
      {confirmDlg&&<ConfirmDialog message={confirmDlg.msg} onConfirm={confirmDlg.cb} onCancel={()=>setConfirmDlg(null)}/>}
      {showBackupModal&&<BackupModal lastBackup={lastBackup} onBackup={()=>handleBackup(true)} onDismiss={()=>setShowBackupModal(false)} backing={backingUp}/>}
      {seeding&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{background:'#fff',borderRadius:12,padding:32,textAlign:'center',maxWidth:360}}><div style={{width:40,height:40,border:'3px solid #e5e7eb',borderTop:'3px solid #059669',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}}/><div style={{fontWeight:600,marginBottom:8}}>Loading data into Supabase</div><div style={{fontSize:13,color:'#6b7280'}}>{seedProg}</div></div></div>}
      {nextPopup&&nextPopup.candidates[nextPopup.currentIdx]&&<NextCandidatePopup candidate={nextPopup.candidates[nextPopup.currentIdx]} studentInfo={nextPopup.studentInfo} totalCandidates={nextPopup.candidates.length} currentIdx={nextPopup.currentIdx} onSend={handleNextSend} onSkip={handleNextSkip} onClose={()=>setNextPopup(null)}/>}
      {showAdd&&<AddGFRModal programs={programs} departments={departments} onClose={()=>setShowAdd(false)} onSave={async r=>{await addGFR(r);setShowAdd(false);}}/>}

      <div style={{maxWidth:1500,margin:'0 auto',padding:'20px 24px'}}>
        {/* Stats — view-specific */}
        {view==='faculty'&&(
          <div style={{display:'flex',gap:8,marginBottom:backupDue?8:12,flexWrap:'wrap',alignItems:'center',justifyContent:'flex-end'}}>
            {gfrEmpty&&<button className="btn btn-p" onClick={()=>seedTable('gfr')} style={{whiteSpace:'nowrap',fontSize:12}}>⬆ Load GFR Data</button>}
            <button className="btn btn-g" onClick={()=>setShowAdd(true)}>+ Add GFR</button>
            <button className="btn btn-o" onClick={()=>typeof exportCSV==="function"&&exportCSV(gfrWithPending,requests,students)}>⬇ Export</button>
            <button className="btn" onClick={()=>backupDue?setShowBackupModal(true):handleBackup()} disabled={backingUp} title={lastBackup?'Last: '+new Date(lastBackup).toLocaleDateString():'Never backed up'} style={{background:backupDue?'#d97706':'#374151',color:'#fff',opacity:backingUp?0.7:1,animation:backupDue?'pulse 2s infinite':'none',whiteSpace:'nowrap'}}>
              {backingUp?'⏳…':backupDue?'🔔 Backup Due':'☁ Backup'}
            </button>
          </div>
        )}
        {view==='faculty'&&<FacultyView gfrData={gfrWithPending} updateGFR={updateGFR} deleteGFR={deleteGFR} departments={departments} programs={programs} notify={notify}/>}

        {view==='committee'&&(
          <div style={{display:'flex',gap:8,marginBottom:backupDue?8:12,flexWrap:'wrap',alignItems:'center',justifyContent:'flex-end'}}>

        )}

        {view==='tracking'&&(
          <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
            {[['Pending',stats.pending,stats.pending>0?'#fef3c7':'#f9fafb',stats.pending>0?'#92400e':'#6b7280','#d97706'],['Total Requests',requests.length,'#f9fafb','#374151','#9ca3af'],['Accepted',requests.filter(r=>r.status==='accepted').length,'#d1fae5','#065f46','#059669'],['Declined/No Reply',requests.filter(r=>r.status==='declined'||r.status==='no_response').length,'#fee2e2','#991b1b','#ef4444']].map(([label,val,bg,fg,accent])=>(
              <div key={label} style={{background:bg,color:fg,borderRadius:10,padding:'10px 16px',flex:1,minWidth:80,borderLeft:'3px solid '+accent}}>
                <div style={{fontSize:20,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{val}</div>
                <div style={{fontSize:11,opacity:0.75,marginTop:1}}>{label}</div>
              </div>
            ))}
            <button className="btn btn-o" onClick={()=>backupDue?setShowBackupModal(true):handleBackup()} title={lastBackup?'Last: '+new Date(lastBackup).toLocaleDateString():'Never'} style={{whiteSpace:'nowrap',animation:backupDue?'pulse 2s infinite':'none',color:backupDue?'#d97706':'#374151',borderColor:backupDue?'#d97706':'#d1d5db'}}>
              {backupDue?'🔔 Backup Due':'☁ Backup'}
            </button>
          </div>
        )}
        {view==='tracking'&&<TrackingView requests={requests} gfrData={gfrWithPending} handleAccept={handleAccept} handleDecline={handleDecline} notify={notify}/>}

        {view==='committee' &&<CommitteeView students={students} programs={programs} updateStudent={updateStudent} addStudent={addStudent} deleteStudent={deleteStudent} gfrData={gfrWithPending} addRequest={addRequest} requests={requests} notify={notify}/>}
        {view==='settings'  &&<SettingsView  programs={programs} departments={departments} advisors={advisors} updateProgram={updateProgram} updateDepartment={updateDepartment} updateAdvisor={updateAdvisor} notify={notify}/>}
      </div>
    </div>
  );
}

// ── Faculty List ──────────────────────────────────────────────────────────────
function FacultyView({gfrData,updateGFR,deleteGFR,departments,programs,notify}){
  const [search,setSearch]=useState('');
  const [fStatus,setFStatus]=useState('All');
  const [fCollege,setFCollege]=useState('All');
  const [sort,setSort]=useState('name');
  const [expanded,setExpanded]=useState(null);
  const colleges=['All',...Object.keys(COLLEGE_MAP)];
  const filtered=useMemo(()=>gfrData.filter(r=>{
    if(fStatus==='Pending'&&!r.hasPendingRequest)return false;
    if(fStatus!=='All'&&fStatus!=='Pending'&&r.liveStatus!==fStatus)return false;
    if(fCollege!=='All'&&r.college!==fCollege)return false;
    if(search){const q=search.toLowerCase();return r.name.toLowerCase().includes(q)||(r.department||'').toLowerCase().includes(q)||(r.college||'').toLowerCase().includes(q)||(r.notes||'').toLowerCase().includes(q);}
    return true;
  }).sort((a,b)=>{if(sort==='name')return a.name.localeCompare(b.name);if(sort==='college')return(a.college||'').localeCompare(b.college||'');if(sort==='status')return a.liveStatus.localeCompare(b.liveStatus);return 0;}),[gfrData,search,fStatus,fCollege,sort]);

  return(<div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, dept, college, notes…" className="fi" style={{flex:1,minWidth:200}}/>
      <select value={fStatus} onChange={e=>setFStatus(e.target.value)} className="fi" style={{width:'auto'}}>
        {['All','Free','Active','Declined','Pending'].map(s=><option key={s}>{s}</option>)}
      </select>
      <select value={fCollege} onChange={e=>setFCollege(e.target.value)} className="fi" style={{width:'auto'}}>
        {colleges.map(c=><option key={c}>{c}</option>)}
      </select>
      <select value={sort} onChange={e=>setSort(e.target.value)} className="fi" style={{width:'auto'}}>
        <option value="name">Sort: Name</option><option value="college">Sort: College</option><option value="status">Sort: Status</option>
      </select>
      <span style={{color:'#9ca3af',fontSize:12,whiteSpace:'nowrap'}}>{filtered.length} of {gfrData.length}</span>
    </div>

    {/* Live stats — update with current filters */}
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      {[
        ['Showing',filtered.length,'#f3f4f6','#374151','#d1d5db'],
        ['Free',filtered.filter(r=>r.liveStatus==='Free').length,'#d1fae5','#065f46','#059669'],
        ['Active',filtered.filter(r=>r.liveStatus==='Active').length,'#fef3c7','#92400e','#d97706'],
        ['Declined',filtered.filter(r=>r.liveStatus==='Declined').length,'#f3f4f6','#6b7280','#9ca3af'],
        ['Pending',filtered.filter(r=>r.hasPendingRequest).length,'#dbeafe','#1e3a8a','#2563eb'],
      ].map(([label,val,bg,fg,accent])=>(
        <div key={label} style={{background:bg,color:fg,borderRadius:8,padding:'8px 14px',flex:1,minWidth:70,borderLeft:'3px solid '+accent}}>
          <div style={{fontSize:18,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{val}</div>
          <div style={{fontSize:10,opacity:0.8,marginTop:1}}>{label}</div>
        </div>
      ))}
    </div>
    <div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{background:'#f8f7f4',borderBottom:'1.5px solid #e5e7eb'}}>
          {['Professor','College','Department','Title','Status','Assignment','Notes',''].map(h=>(
            <th key={h} style={{padding:'9px 13px',textAlign:'left',fontWeight:600,color:'#374151',fontSize:12,whiteSpace:'nowrap'}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {filtered.map((row,i)=>{
            const sc=STATUS_CFG[row.liveStatus]||STATUS_CFG.Free;
            const isExp=expanded===row.id;
            return[
              <tr key={row.id} className="rh" onClick={()=>setExpanded(isExp?null:row.id)} style={{borderBottom:'1px solid #f3f4f6',cursor:'pointer',background:i%2===0?'#fff':'#fafafa'}}>
                <td style={{padding:'9px 13px',fontWeight:500,fontSize:14}}>
                  {row.name}
                  {row.declineCount>0&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b',marginLeft:6,fontSize:10}}>{'↓'.repeat(Math.min(row.declineCount,3))} {row.declineCount} declined</span>}
                </td>
                <td style={{padding:'9px 13px'}}><span style={{background:'#e5e7eb',color:'#374151',borderRadius:4,padding:'2px 7px',fontSize:12,fontFamily:"'DM Mono',monospace"}}>{row.college}</span></td>
                <td style={{padding:'9px 13px',color:'#6b7280',fontSize:13}}>{row.department}</td>
                <td style={{padding:'9px 13px',color:'#9ca3af',fontSize:13}}>{row.title}</td>
                <td style={{padding:'9px 13px',minWidth:120}}>
                  <span className="badge" style={{background:sc.bg,color:sc.color}}>{sc.label}</span>
                  {row.hasPendingRequest&&<span className="badge" style={{background:PENDING_CFG.bg,color:PENDING_CFG.color,display:'block',marginTop:4}}>✉ Pending</span>}
                </td>
                <td style={{padding:'9px 13px',fontSize:13}}>
                  {row.liveStatus==='Active'&&row.displayStudent
                    ?<div><div style={{fontWeight:500}}>{row.displayStudent}</div>{row.displayGrad&&<div style={{color:'#d97706',fontSize:12}}>Grad: {row.displayGrad}</div>}{row.displayProgram&&<div style={{color:'#9ca3af',fontSize:12}}>{row.displayProgram}</div>}</div>
                    :<span style={{color:'#d1d5db'}}>—</span>}
                </td>
                <td style={{padding:'9px 13px',color:'#9ca3af',fontSize:12,maxWidth:160}}>
                  {row.notes?<span title={row.notes} style={{display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:150}}>{row.notes.split('\n')[0]}</span>:<span style={{color:'#e5e7eb'}}>—</span>}
                </td>
                <td style={{padding:'9px 13px',color:'#9ca3af'}}>{isExp?'▲':'▼'}</td>
              </tr>,
              isExp&&(<tr key={row.id+'_e'} style={{borderBottom:'1px solid #e5e7eb'}}><td colSpan={8} style={{padding:'16px 20px',background:'#f8f7f4'}}>
                <GFRDetail row={row} updateGFR={updateGFR} deleteGFR={deleteGFR} departments={departments} notify={notify} onClose={()=>setExpanded(null)}/>
              </td></tr>)
            ];
          })}
        </tbody>
      </table>
      {filtered.length===0&&<div style={{textAlign:'center',padding:40,color:'#9ca3af'}}>No results found</div>}
    </div>
  </div>);
}

// ── Find GFR ──────────────────────────────────────────────────────────────────
function FindGFRView({gfrData,updateGFR,addRequest,requests,programs,notify}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({studentName:'',studentId:'',studentCollege:'',studentProgram:'',dissertation:'',chair:'',cochair:'',members:'',proposalDate:'',gradExpected:''});
  const [candidates,setCandidates]=useState([]);
  const [selected,setSelected]=useState(null);
  const [emailBody,setEmailBody]=useState('');
  const [sending,setSending]=useState(false);
  const f=k=>v=>setForm(p=>({...p,[k]:v}));

  // Auto-fill college when program changes
  const onProgramChange=v=>{
    const prog=programs.find(p=>p.code===v||p.name===v);
    setForm(p=>({...p,studentProgram:v,studentCollege:prog?prog.college_code:p.studentCollege}));
  };
  const progOpts=programs.map(p=>({value:p.code,label:p.name+' ('+p.code+')'}));

  const findCandidates=()=>{
    if(!form.studentName.trim()){notify('Please enter student name','error');return;}
    const tried=new Set(requests.filter(r=>r.student_name===form.studentName).map(r=>String(r.gfr_id)));
    const pool=shuffle(gfrData.filter(r=>r.liveStatus==='Free'&&r.college!==form.studentCollege&&!r.hasPendingRequest&&!tried.has(String(r.id)))).slice(0,6);
    setCandidates(pool);setStep(2);
  };

  const buildEmail=(gfr,frm)=>{
    const ln=gfr.name.split(' ').pop();
    const proposalLine=frm.proposalDate
      ?'The anticipated proposal hearing is for '+frm.proposalDate+', but your'
      :'Your';
    const memberPart=frm.members?', committee members are '+frm.members+',':',';
    return[
      'Dr. '+ln+',','',
      frm.studentName+', a doctoral student in the '+(frm.studentProgram||frm.studentCollege)+' program, needs a Graduate Faculty Representative for their dissertation advisory committee and your participation is requested.','',
      'You are receiving this request because you are now eligible to serve as a Graduate Faculty Representative with the changes made to the newly approved Graduate Committee Membership policy. (__12.99.99.c0.03-graduate-committee-membership__)','',
      'Below is some text regarding this responsibility that can provide some additional information.','',
      'The committee chair is '+frm.chair+(frm.cochair?', Co-Chair is '+frm.cochair:'')+memberPart+' and the dissertation title is "'+frm.dissertation+'"','',
      proposalLine+' response within __two business days__ would be greatly appreciated. Thank you, in advance, for considering this request. Please let me know if you have any questions!','','',
      'Doctoral Committee',
      "The student will choose a doctoral committee chair from among the regular graduate faculty members of the doctoral program. Doctoral committees will be composed of a minimum of four Texas A&M University-Corpus Christi graduate faculty members and will include the doctoral committee chair, two other graduate faculty members, and a Graduate Faculty Representative, selected from a different department or college/school. The Associate Provost will officially appoint the doctoral committee. Normally, the student's committee chair and the committee members recommended by the student and the chair will be faculty members from the program offering the degree. Persons with unique and appropriate expertise may be appointed to the dissertation committee upon approval of the Associate Provost for the dissertation portion of the doctoral program. All doctoral committee members representing the student's discipline may be required to review and approve degree plans and participate in qualifying examinations, proposal hearings, comprehensive and final examinations, including defense of dissertation, and all are required to sign relevant documents. More than one dissenting vote in the dissertation defense/final examination will constitute failure. The Graduate Faculty Representative will not be required to attend or evaluate materials related to the comprehensive examination.",'',
      'Graduate Faculty Representative',
      "The Graduate Faculty Representative helps ensure the quality of the graduate degree is appropriate for Texas A&M University-Corpus Christi and that students receive fair and reasonable treatment in their graduate experience. All committee members will be provided a copy of the proposal and the dissertation allowing for a two-week turnaround before the scheduled proposal and defense/final examination.",'',
      'Regards,','Sahith Reddy Vellenki.'
    ].join('\n');
  };;

  const selectCandidate=gfr=>{setSelected(gfr);setEmailBody(buildEmail(gfr,form));setStep(3);};
  const openOutlook=()=>window.location.href='mailto:?subject='+encodeURIComponent('GFR Request – '+form.studentName)+'&body='+encodeURIComponent(emailBody);

  const logRequest=async()=>{
    setSending(true);
    const req={gfr_id:String(selected.id),gfr_name:selected.name,gfr_college:selected.college,student_name:form.studentName,student_college:form.studentCollege,student_program:form.studentProgram,dissertation:form.dissertation,chair:form.chair,cochair:form.cochair,members:form.members,grad_expected:form.gradExpected,email_body:emailBody,sent_at:new Date().toISOString(),deadline:new Date(Date.now()+48*3600000).toISOString(),status:'pending'};
    const saved=await addRequest(req);
    if(saved){notify('Logged — '+selected.name+' marked Pending');setStep(1);setForm({studentName:'',studentId:'',studentCollege:'',studentProgram:'',dissertation:'',chair:'',cochair:'',members:'',proposalDate:'',gradExpected:''});setCandidates([]);setSelected(null);setEmailBody('');}
    setSending(false);
  };

  return(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
    <div>
      <div style={{display:'flex',alignItems:'center',marginBottom:20}}>
        {[['1','Details'],['2','Pick GFR'],['3','Send']].map(([n,label],i)=>(
          <div key={n} style={{display:'flex',alignItems:'center',flex:1}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1}}>
              <div style={{width:26,height:26,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,background:step>=parseInt(n)?'#1a1a2e':'#e5e7eb',color:step>=parseInt(n)?'#fff':'#9ca3af'}}>{n}</div>
              <span style={{fontSize:11,marginTop:3,color:step>=parseInt(n)?'#1a1a2e':'#9ca3af'}}>{label}</span>
            </div>
            {i<2&&<div style={{width:24,height:2,flexShrink:0,marginBottom:16,background:step>i+1?'#059669':'#e5e7eb'}}/>}
          </div>
        ))}
      </div>

      {step===1&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',padding:20}}>
        <h3 style={{margin:'0 0 14px',fontSize:14}}>Student & Thesis Details</h3>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Field label="Student Name *" value={form.studentName} onChange={f('studentName')}/>
          <Field label="Program *" value={form.studentProgram} onChange={onProgramChange} options={progOpts}/>
          <div>
            <label className="fl">Student College (auto-filled)</label>
            <span className="fa">{form.studentCollege?form.studentCollege+' — '+(COLLEGE_MAP[form.studentCollege]||form.studentCollege):'Select a program above'}</span>
          </div>
          <Field label="Committee Chair *" value={form.chair} onChange={f('chair')}/>
          <Field label="Co-Chair (optional)" value={form.cochair} onChange={f('cochair')}/>
          <Field label="Other Committee Members" value={form.members} onChange={f('members')}/>
          <Field label="Anticipated Graduation" value={form.gradExpected} onChange={f('gradExpected')}/>
          <Field label="Proposed Hearing Date" value={form.proposalDate} onChange={f('proposalDate')}/>

    <div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',overflow:'hidden',display:'flex',flexDirection:'column'}}>

// ── Requests / Tracking ───────────────────────────────────────────────────────
function TrackingView({requests,gfrData,handleAccept,handleDecline,notify}){
  const [search,setSearch]=useState('');
  const [fStatus,setFStatus]=useState('pending');
  const [expandedEmail,setExpandedEmail]=useState(null);
  const now=Date.now();
  const tl=d=>{const diff=new Date(d).getTime()-now;if(diff<=0)return{label:'Overdue',color:'#ef4444',overdue:true};const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);return{label:h+'h '+m+'m left',color:h<8?'#f59e0b':'#059669',overdue:false};};

  // Attempt count per student
  const attemptCount=useMemo(()=>{
    const map={};
    requests.forEach(r=>{if(!map[r.student_name])map[r.student_name]=0;map[r.student_name]++;});
    return map;
  },[requests]);

  const filtered=useMemo(()=>requests.filter(r=>{
    if(fStatus!=='all'&&r.status!==fStatus)return false;
    if(search){const q=search.toLowerCase();return(r.student_name||'').toLowerCase().includes(q)||(r.gfr_name||'').toLowerCase().includes(q);}
    return true;
  }),[requests,search,fStatus]);

  const pending=filtered.filter(r=>r.status==='pending');
  const resolved=filtered.filter(r=>r.status!=='pending');

  return(<div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search student or GFR name…" className="fi" style={{flex:1,minWidth:200}}/>
      <select value={fStatus} onChange={e=>setFStatus(e.target.value)} className="fi" style={{width:'auto'}}>
        <option value="pending">Pending Only</option>
        <option value="accepted">Accepted</option>
        <option value="declined">Declined</option>
        <option value="no_response">No Response</option>
        <option value="all">All Requests</option>
      </select>
    </div>

    {(fStatus==='pending'||fStatus==='all')&&<>
      <h3 style={{margin:'0 0 12px',fontSize:14,color:'#1a1a2e'}}>
        Pending Requests
        {pending.length>0&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b',marginLeft:8}}>{pending.length} pending</span>}
      </h3>
      {pending.length===0&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',padding:40,textAlign:'center',color:'#9ca3af',marginBottom:20}}><div style={{fontSize:28,marginBottom:8}}>✓</div>No pending requests</div>}
      {pending.map(req=>{
        const t=tl(req.deadline);
        const attempt=attemptCount[req.student_name]||1;
        return(<div key={req.id} style={{background:'#fff',borderRadius:12,border:'1.5px solid '+(t.overdue?'#fca5a5':'#e5e7eb'),padding:18,marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{req.student_name}
                <span style={{color:'#9ca3af',fontWeight:400,fontSize:12,marginLeft:6}}>{req.student_program||req.student_college}</span>
                <span className="badge" style={{background:'#f3f4f6',color:'#374151',marginLeft:6,fontSize:11}}>Attempt #{attempt}</span>
              </div>
              <div style={{fontSize:12,color:'#6b7280',marginTop:3}}>GFR: <strong>{req.gfr_name}</strong> · {req.gfr_college}</div>
              {req.chair&&<div style={{fontSize:12,color:'#9ca3af',marginTop:2}}>Chair: {req.chair}{req.cochair?' · Co-Chair: '+req.cochair:''}</div>}
              <div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>Sent: {new Date(req.sent_at).toLocaleString()}</div>
            </div>
            <div style={{textAlign:'right'}}><div style={{color:t.color,fontWeight:700,fontSize:14}}>{t.label}</div>{t.overdue&&<div style={{fontSize:11,color:'#ef4444'}}>⚠ Action needed</div>}</div>
          </div>
          {req.dissertation&&<div style={{background:'#f8f7f4',borderRadius:6,padding:'7px 11px',fontSize:11,color:'#374151',marginBottom:10,fontStyle:'italic'}}>"{req.dissertation}"</div>}
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <button onClick={()=>handleAccept(req)} className="btn btn-g" style={{flex:1,justifyContent:'center'}}>✅ Accepted</button>
            <button onClick={()=>handleDecline(req,'declined')} className="btn btn-o" style={{flex:1,justifyContent:'center'}}>❌ Declined → Next</button>
            <button onClick={()=>handleDecline(req,'no_response')} className="btn btn-o" style={{flex:1,justifyContent:'center',color:'#9ca3af'}}>⏰ No Reply → Next</button>
          </div>
          <div style={{fontSize:11,color:'#9ca3af',textAlign:'center'}}>Declining auto-shows next available candidate</div>
        </div>);
      })}
    </>}

    {resolved.length>0&&<>
      <h4 style={{fontSize:12,color:'#9ca3af',margin:'20px 0 10px',textTransform:'uppercase',letterSpacing:'0.06em'}}>Resolved History</h4>
      {resolved.map(req=>(
        <div key={req.id} style={{background:'#fff',borderRadius:8,border:'1px solid #f3f4f6',padding:'10px 14px',marginBottom:6}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:13}}>
              <span style={{fontWeight:500}}>{req.student_name}</span>
              <span style={{color:'#9ca3af',margin:'0 8px'}}>→</span>
              {req.gfr_name}
              <span style={{color:'#9ca3af',fontSize:11,marginLeft:8}}>{new Date(req.sent_at).toLocaleDateString()}</span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button className="btn btn-o btn-sm" onClick={()=>setExpandedEmail(expandedEmail===req.id?null:req.id)}>
                {expandedEmail===req.id?'Hide Email':'📧 View Email'}
              </button>
              <span className="badge" style={{background:req.status==='accepted'?'#d1fae5':req.status==='declined'?'#fee2e2':'#fef3c7',color:req.status==='accepted'?'#065f46':req.status==='declined'?'#991b1b':'#92400e'}}>
                {req.status==='accepted'?'✅ Accepted':req.status==='declined'?'❌ Declined':'⏰ No Response'}
              </span>
            </div>
          </div>
          {expandedEmail===req.id&&req.email_body&&(
            <div style={{marginTop:10,background:'#f8f7f4',borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:11,color:'#9ca3af',textTransform:'uppercase',marginBottom:6}}>Email Sent</div>
              <pre style={{fontSize:11,color:'#374151',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:"'DM Mono','Courier New',monospace"}}>{req.email_body}</pre>
            </div>
          )}
        </div>
      ))}
    </>}
  </div>);
}

// ── GFR Request Modal (from Committee tab) ────────────────────────────────────
function GFRRequestModal({student,gfrData,requests,addRequest,updateStudent,notify,onClose}){
  const [step,setStep]=useState(1);
  const [candidates,setCandidates]=useState([]);
  const [selected,setSelected]=useState(null);
  const [emailBody,setEmailBody]=useState('');
  const [sending,setSending]=useState(false);

  const pendingIds=new Set(requests.filter(r=>r.status==='pending').map(r=>String(r.gfr_id)));
  const triedIds=new Set(requests.filter(r=>r.student_name===student.full_name).map(r=>String(r.gfr_id)));

  const findCandidates=()=>{
    const pool=shuffle(gfrData.filter(r=>
      r.liveStatus==='Free'&&
      r.college!==student.college_code&&
      !pendingIds.has(String(r.id))&&
      !triedIds.has(String(r.id))
    ));
    setCandidates(pool);
    setStep(2);
  };

  const selectCandidate=(gfr)=>{
    setSelected(gfr);
    const ln=gfr.name.split(' ').pop();
    const proposalLine=student.proposal_date?'The anticipated proposal hearing is for '+student.proposal_date+', but your':'Your';
    const body=[
      'Dr. '+ln+',','',
      student.first_name+' '+student.last_name+', a doctoral student in the '+student.program_name+' program, needs a Graduate Faculty Representative for their dissertation advisory committee and your participation is requested.','',
      'You are receiving this request because you are now eligible to serve as a Graduate Faculty Representative with the changes made to the newly approved Graduate Committee Membership policy. (__12.99.99.c0.03-graduate-committee-membership__)','',
      'Below is some text regarding this responsibility that can provide some additional information.','',
      'The committee chair is '+(student.chair||'[Chair]')+(student.cochair?', Co-Chair is '+student.cochair:'')+', and the dissertation title is "'+(student.dissertation_title||'[Title]')+'"','',
      proposalLine+' response within __two business days__ would be greatly appreciated. Thank you, in advance, for considering this request. Please let me know if you have any questions!','','',
      'Doctoral Committee',
      "The student will choose a doctoral committee chair from among the regular graduate faculty members of the doctoral program. Doctoral committees will be composed of a minimum of four Texas A&M University-Corpus Christi graduate faculty members and will include the doctoral committee chair, two other graduate faculty members, and a Graduate Faculty Representative, selected from a different department or college/school. The Associate Provost will officially appoint the doctoral committee. All doctoral committee members representing the student's discipline may be required to review and approve degree plans and participate in qualifying examinations, proposal hearings, comprehensive and final examinations, including defense of dissertation, and all are required to sign relevant documents. More than one dissenting vote in the dissertation defense/final examination will constitute failure. The Graduate Faculty Representative will not be required to attend or evaluate materials related to the comprehensive examination.",'',
      'Graduate Faculty Representative',
      "The Graduate Faculty Representative helps ensure the quality of the graduate degree is appropriate for Texas A&M University-Corpus Christi and that students receive fair and reasonable treatment in their graduate experience. All committee members will be provided a copy of the proposal and the dissertation allowing for a two-week turnaround before the scheduled proposal and defense/final examination.",'',
      'Regards,','Sahith Reddy Vellenki.'
    ].join('\n');
    setEmailBody(body);
    setStep(3);
  };

  const openOutlook=()=>window.location.href='mailto:?subject='+encodeURIComponent('GFR Request – '+student.first_name+' '+student.last_name)+'&body='+encodeURIComponent(emailBody);

  const logRequest=async()=>{
    setSending(true);
    const req={
      gfr_id:String(selected.id),gfr_name:selected.name,gfr_college:selected.college,
      student_name:student.full_name,student_college:student.college_code,
      student_program:student.program_name||student.major,
      dissertation:student.dissertation_title||'',
      chair:student.chair||'',cochair:student.cochair||'',
      members:student.committee_members||'',
      grad_expected:student.anticipated_grad||'',
      email_body:emailBody,
      sent_at:new Date().toISOString(),
      deadline:new Date(Date.now()+48*3600000).toISOString(),
      status:'pending'
    };
    const saved=await addRequest(req);
    if(saved){
      // Also update the student's GFR field to show pending
      await updateStudent(student.id,{gfr:selected.name+' (pending)'});
      notify('GFR request sent to '+selected.name+' — 48hr clock started');
      onClose();
    }
    setSending(false);
  };

  const attempt=requests.filter(r=>r.student_name===student.full_name).length+1;

  return(
    <div className="modal-bg" style={{zIndex:600}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:800,maxHeight:'92vh',overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <div style={{background:'#1a1a2e',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#fff',fontWeight:600,fontSize:14}}>✉️ Send GFR Request</div>
            <div style={{color:'#94a3b8',fontSize:12,marginTop:2}}>{student.first_name} {student.last_name} · {student.program_name||student.major} · Attempt #{attempt}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#94a3b8',fontSize:20,cursor:'pointer'}}>×</button>
        </div>

        {/* Student summary */}
        <div style={{padding:'12px 20px',background:'#f8f7f4',borderBottom:'1px solid #e5e7eb',display:'flex',gap:24,flexWrap:'wrap',fontSize:12}}>
          {[['Chair',student.chair],['Co-Chair',student.cochair],['College',student.college_code],['Dissertation',student.dissertation_title]].filter(([,v])=>v).map(([k,v])=>(
            <div key={k}><span style={{color:'#9ca3af'}}>{k}: </span><strong style={{color:'#374151'}}>{v&&v.length>40?v.substring(0,40)+'…':v}</strong></div>
          ))}
        </div>

        <div style={{display:'flex',flex:1,overflow:'hidden'}}>
          {/* Left: steps */}
          <div style={{width:300,borderRight:'1px solid #e5e7eb',padding:16,overflowY:'auto'}}>
            {step===1&&(
              <div>
                <div style={{fontWeight:600,marginBottom:8,fontSize:13}}>Ready to find a GFR?</div>
                <div style={{fontSize:12,color:'#6b7280',marginBottom:16,lineHeight:1.6}}>
                  This will search for free faculty from a different college than <strong>{student.college_code}</strong>, excluding anyone already contacted for this student.
                </div>
                {student.gfr&&!student.gfr.includes('pending')&&(
                  <div style={{background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:8,padding:'8px 12px',marginBottom:12,fontSize:12,color:'#92400e'}}>
                    ⚠️ Current GFR: <strong>{student.gfr}</strong>. Sending a new request will replace this.
                  </div>
                )}
                <button className="btn btn-p" onClick={findCandidates} style={{width:'100%',justifyContent:'center'}}>Find Available GFRs →</button>
              </div>
            )}
            {step===2&&(
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{fontWeight:600,fontSize:13}}>Available GFRs <span style={{color:'#9ca3af',fontWeight:400}}>({candidates.length})</span></div>
                  <button className="btn btn-o btn-sm" onClick={findCandidates}>🔀 Reshuffle</button>
                </div>
                {candidates.length===0?<div style={{color:'#9ca3af',fontSize:12,textAlign:'center',padding:20}}>No eligible GFRs found.</div>:candidates.slice(0,8).map(gfr=>(
                  <div key={gfr.id} onClick={()=>selectCandidate(gfr)}
                    style={{border:'1.5px solid #e5e7eb',borderRadius:8,padding:'10px 12px',marginBottom:8,cursor:'pointer',transition:'all 0.12s'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='#059669';e.currentTarget.style.background='#f0fdf4';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='#e5e7eb';e.currentTarget.style.background='#fff';}}>
                    <div style={{fontWeight:500,fontSize:13}}>{gfr.name}{gfr.declineCount>0&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b',marginLeft:4,fontSize:10}}>{gfr.declineCount}× declined</span>}</div>
                    <div style={{fontSize:11,color:'#6b7280'}}>{gfr.college} · {gfr.department}</div>
                  </div>
                ))}
              </div>
            )}
            {step===3&&selected&&(
              <div>
                <button className="btn btn-o btn-sm" onClick={()=>setStep(2)} style={{marginBottom:12}}>← Back</button>
                <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,padding:'10px 12px',marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:600,color:'#065f46'}}>Sending to: {selected.name}</div>
                  <div style={{fontSize:11,color:'#047857'}}>{selected.college} · {selected.department}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <button className="btn btn-b" onClick={openOutlook} style={{justifyContent:'center'}}>📧 Open in Outlook</button>
                  <button className="btn btn-o" onClick={()=>navigator.clipboard.writeText(emailBody).then(()=>notify('Copied!'))} style={{justifyContent:'center'}}>📋 Copy Email</button>
                  <button className="btn btn-g" onClick={logRequest} disabled={sending} style={{justifyContent:'center',opacity:sending?0.7:1}}>{sending?'Saving…':'✓ Log Request & Start 48hr Clock'}</button>
                </div>
              </div>
            )}
          </div>

          {/* Right: email preview */}
          <div style={{flex:1,display:'flex',flexDirection:'column'}}>
            <div style={{padding:'8px 14px',background:'#f8f7f4',borderBottom:'1px solid #e5e7eb',fontSize:11,color:'#9ca3af',textTransform:'uppercase'}}>
              Email Preview {step===3?'— edit if needed':''}
            </div>
            {emailBody?<textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)}
              style={{flex:1,padding:14,border:'none',fontSize:12,fontFamily:"'DM Mono','Courier New',monospace",lineHeight:1.7,resize:'none',color:'#374151'}}/>
              :<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#9ca3af',flexDirection:'column',gap:8}}><div style={{fontSize:24}}>✉️</div><div style={{fontSize:12}}>Select a GFR to preview the email</div></div>}
          </div>
        </div>
      </div>
    </div>
  );
}
