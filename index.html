<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Helvetica Neue',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

@keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.btn{border:none;border-radius:7px;padding:9px 16px;cursor:pointer;font-weight:500;font-size:13px;font-family:inherit;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:#1a1a2e;color:#fff}.btn-p:hover{background:#059669}
.btn-o{background:transparent;color:#374151;border:1.5px solid #d1d5db}.btn-o:hover{border-color:#059669;color:#059669}
.btn-g{background:#059669;color:#fff}.btn-g:hover{background:#047857}
.btn-r{background:#ef4444;color:#fff}.btn-r:hover{background:#dc2626}
.btn-b{background:#2563eb;color:#fff}.btn-b:hover{background:#1d4ed8}
.btn-y{background:#d97706;color:#fff}.btn-y:hover{background:#b45309}
.btn-sm{padding:5px 11px!important;font-size:12px!important}
input:focus,select:focus,textarea:focus{outline:2px solid #059669;outline-offset:1px}
td,th{vertical-align:middle}
.rh:hover{background:#f0fdf4!important}

.field-grid{display:grid;gap:10px}
.fl{font-size:12px;color:#374151;display:block;margin-bottom:4px;font-weight:600;letter-spacing:0.01em}
.fi{width:100%;padding:8px 11px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;font-family:inherit;background:#fff}

// ── Confirm Delete Dialog ────────────────────────────────────────────────────
function ConfirmDialog({message,onConfirm,onCancel}){
  return(
    <div className="modal-bg" style={{zIndex:900}}>
      <div style={{background:'#fff',borderRadius:12,padding:28,maxWidth:400,width:'100%',textAlign:'center'}}>
        <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
        <div style={{fontWeight:600,fontSize:15,marginBottom:8}}>Are you sure?</div>
        <div style={{fontSize:13,color:'#6b7280',marginBottom:24,lineHeight:1.6}}>{message}</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-r" onClick={onConfirm} style={{flex:1}}>Yes, Delete</button>
          <button className="btn btn-o" onClick={onCancel} style={{flex:1}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── Backup Reminder Modal ────────────────────────────────────────────────────
function BackupModal({lastBackup,onBackup,onDismiss,backing}){
  const days=lastBackup?Math.floor((Date.now()-new Date(lastBackup).getTime())/86400000):null;
  return(
    <div className="modal-bg" style={{zIndex:800}}>
      <div style={{background:'#fff',borderRadius:16,maxWidth:440,width:'100%',overflow:'hidden'}}>
        <div style={{background:'linear-gradient(135deg,#d97706,#f59e0b)',padding:'24px 28px'}}>
          <div style={{fontSize:36,marginBottom:8}}>☁️</div>
          <div style={{color:'#fff',fontWeight:700,fontSize:18}}>Backup Reminder</div>
          <div style={{color:'rgba(255,255,255,0.85)',fontSize:13,marginTop:4}}>
            {days===null?'You have never backed up this data.':'Last backup was '+days+' days ago.'}
          </div>
        </div>
        <div style={{padding:'20px 28px'}}>
          <div style={{background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:13,color:'#92400e',lineHeight:1.6}}>
            Regular backups keep your data safe. This saves <strong>{buildBackupFilename()}</strong> to SharePoint — includes <strong>all GFR faculty, all students, and all request history</strong>.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <button onClick={onBackup} disabled={backing} className="btn btn-y" style={{width:'100%',padding:12,fontSize:14,opacity:backing?0.7:1,justifyContent:'center'}}>
              {backing?'⏳ Backing up…':'☁ Back Up to SharePoint Now'}
            </button>
            <button onClick={onDismiss} className="btn btn-o" style={{width:'100%',padding:10,fontSize:13,justifyContent:'center',color:'#9ca3af'}}>
              Remind me later
            </button>
          </div>
          <div style={{fontSize:11,color:'#d1d5db',textAlign:'center',marginTop:12}}>Reminder repeats every 14 days</div>
        </div>
      </div>
    </div>
  );
}

// ── Next Candidate Popup ─────────────────────────────────────────────────────
function NextCandidatePopup({candidate,studentInfo,totalCandidates,currentIdx,onSend,onSkip,onClose}){
  const [emailBody,setEmailBody]=useState('');
  const [sending,setSending]=useState(false);
  useEffect(()=>{
    if(!candidate||!studentInfo)return;
    const ln=candidate.name.split(' ').pop();
    const f=studentInfo;
    setEmailBody(['Dr. '+ln+',','',
      f.student_name+', a doctoral student in the '+(f.student_program||f.student_college)+' program, needs a Graduate Faculty Representative for their dissertation advisory committee and your participation is requested.','',
      'You are receiving this request because you are now eligible to serve as a Graduate Faculty Representative with the changes made to the newly approved Graduate Committee Membership policy. (__12.99.99.c0.03-graduate-committee-membership__)','',
      'Below is some text regarding this responsibility that can provide some additional information.','',
      'The committee chair is '+(f.chair||'[Chair]')+(f.cochair?', Co-Chair is '+f.cochair:'')+', and the dissertation title is "'+(f.dissertation||'[Title]')+'"','',
      'Your response within __two business days__ would be greatly appreciated. Thank you, in advance, for considering this request. Please let me know if you have any questions!','','',
      'Doctoral Committee',
      "The student will choose a doctoral committee chair from among the regular graduate faculty members of the doctoral program. Doctoral committees will be composed of a minimum of four Texas A&M University-Corpus Christi graduate faculty members and will include the doctoral committee chair, two other graduate faculty members, and a Graduate Faculty Representative, selected from a different department or college/school. The Associate Provost will officially appoint the doctoral committee. All doctoral committee members representing the student's discipline may be required to review and approve degree plans and participate in qualifying examinations, proposal hearings, comprehensive and final examinations, including defense of dissertation, and all are required to sign relevant documents. More than one dissenting vote in the dissertation defense/final examination will constitute failure. The Graduate Faculty Representative will not be required to attend or evaluate materials related to the comprehensive examination.",'',
      'Graduate Faculty Representative',
      "The Graduate Faculty Representative helps ensure the quality of the graduate degree is appropriate for Texas A&M University-Corpus Christi and that students receive fair and reasonable treatment in their graduate experience. All committee members will be provided a copy of the proposal and the dissertation allowing for a two-week turnaround before the scheduled proposal and defense/final examination.",'',
      'Regards,','Sahith Reddy Vellenki.'
    ].join('\n'));
  },[candidate,studentInfo]);
  if(!candidate)return null;
  const send=async()=>{setSending(true);await onSend(candidate,emailBody);setSending(false);};
  return(
    <div className="modal-bg" style={{zIndex:800}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:700,maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <div style={{background:'#1a1a2e',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#fff',fontWeight:600,fontSize:14}}>🔄 Next GFR Candidate
              <span style={{color:'#94a3b8',fontSize:12,fontWeight:400,marginLeft:8}}>Candidate {currentIdx+1} of {totalCandidates}</span>
            </div>
            <div style={{color:'#94a3b8',fontSize:12,marginTop:2}}>Previous professor declined or didn't respond</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#94a3b8',fontSize:20,cursor:'pointer'}}>×</button>
        </div>
        <div style={{padding:'12px 20px',borderBottom:'1px solid #e5e7eb',display:'flex',gap:24,background:'#f8f7f4'}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:'#9ca3af',textTransform:'uppercase',marginBottom:3}}>Suggested GFR</div>
            <div style={{fontWeight:600}}>{candidate.name}</div>
            <div style={{fontSize:12,color:'#6b7280'}}>{candidate.college} · {candidate.department}</div>
            <span className="badge" style={{background:'#d1fae5',color:'#065f46',marginTop:4}}>Free</span>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:'#9ca3af',textTransform:'uppercase',marginBottom:3}}>For Student</div>
            <div style={{fontWeight:600}}>{studentInfo?.student_name}</div>
            <div style={{fontSize:12,color:'#6b7280'}}>{studentInfo?.student_program||studentInfo?.student_college}</div>
            {studentInfo?.dissertation&&<div style={{fontSize:11,color:'#9ca3af',fontStyle:'italic',marginTop:2}}>"{studentInfo.dissertation.substring(0,70)}…"</div>}
          </div>
        </div>
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',padding:'8px 20px 0'}}>
          <div style={{fontSize:11,color:'#9ca3af',textTransform:'uppercase',marginBottom:4}}>Email Preview — edit if needed</div>
          <textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)}
            style={{flex:1,padding:12,border:'1.5px solid #e5e7eb',borderRadius:8,fontSize:12,fontFamily:"'DM Mono','Courier New',monospace",lineHeight:1.7,resize:'none',color:'#374151',minHeight:200}}/>
        </div>
        <div style={{padding:12,borderTop:'1px solid #e5e7eb',display:'flex',gap:8}}>
          <button onClick={send} disabled={sending} className="btn btn-g" style={{flex:2,justifyContent:'center',opacity:sending?0.7:1}}>
            {sending?'Sending…':'✓ Log Request to '+candidate.name}
          </button>
          <button onClick={()=>window.location.href='mailto:?subject='+encodeURIComponent('GFR Request – '+(studentInfo?.student_name||''))+'&body='+encodeURIComponent(emailBody)} className="btn btn-b" style={{flex:1,justifyContent:'center'}}>📧 Outlook</button>
          <button onClick={()=>navigator.clipboard.writeText(emailBody)} className="btn btn-o" style={{flex:1,justifyContent:'center'}}>📋 Copy</button>
          <button onClick={onSkip} className="btn btn-o" style={{flex:1,justifyContent:'center',color:'#9ca3af'}}>Skip →</button>
        </div>
      </div>
    </div>
  );
}

// ── Shared field component ───────────────────────────────────────────────────
function Field({label,value,onChange,type='text',options,readOnly,rows,placeholder,autoList,multiMax}){
  const [acOpen,setAcOpen]=useState(false);
  const [acInput,setAcInput]=useState('');
  const acRef=useRef(null);

  // Multi-select autocomplete (comma-separated with token chips, max N)
  if(autoList&&multiMax){
    const tokens=(value||'').split(',').map(t=>t.trim()).filter(Boolean);
    const q=acInput.toLowerCase().trim();
    const matches=q.length>=1?autoList.filter(n=>!tokens.includes(n)&&n.toLowerCase().includes(q)).slice(0,8):[];
    const canAdd=tokens.length<multiMax;
    const addToken=n=>{
      const next=[...tokens,n].slice(0,multiMax);
      onChange(next.join(', '));
      setAcInput('');
      setAcOpen(false);
    };
    const removeToken=i=>{
      const next=tokens.filter((_,idx)=>idx!==i);
      onChange(next.join(', '));
    };
    return(
      <div style={{position:'relative'}} ref={acRef}>
        <label className="fl">{label} <span style={{color:'#9ca3af',fontWeight:400,fontSize:11}}>({tokens.length}/{multiMax})</span></label>
        <div className="fi" style={{display:'flex',flexWrap:'wrap',gap:4,minHeight:36,padding:'5px 8px',alignItems:'center',cursor:'text'}}
          onClick={()=>{if(canAdd)setAcOpen(true);}}>
          {tokens.map((t,i)=>(
            <span key={i} style={{background:'#d1fae5',color:'#065f46',borderRadius:12,padding:'2px 8px',fontSize:12,display:'inline-flex',alignItems:'center',gap:4}}>
              {t}
              <button type="button" onClick={e=>{e.stopPropagation();removeToken(i);}} style={{background:'none',border:'none',color:'#065f46',cursor:'pointer',padding:0,fontSize:14,lineHeight:1}}>×</button>
            </span>
          ))}
          {canAdd&&<input style={{border:'none',outline:'none',flex:1,minWidth:120,fontSize:13,fontFamily:'inherit',background:'transparent'}}
            value={acInput} placeholder={tokens.length===0?(placeholder||'Type to search faculty…'):'Add another…'}
            onChange={e=>{setAcInput(e.target.value);setAcOpen(true);}}
            onFocus={()=>setAcOpen(true)}
            onBlur={()=>setTimeout(()=>setAcOpen(false),200)}
            onKeyDown={e=>{
              if(e.key==='Backspace'&&!acInput&&tokens.length>0){removeToken(tokens.length-1);}
              if(e.key==='Enter'&&acInput.trim()){e.preventDefault();addToken(acInput.trim());}
              if(e.key===','){e.preventDefault();if(acInput.trim())addToken(acInput.trim());}
            }}/>}
        </div>
        {acOpen&&matches.length>0&&(
          <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'#fff',border:'1.5px solid #059669',borderRadius:'0 0 7px 7px',maxHeight:180,overflowY:'auto',boxShadow:'0 4px 16px rgba(0,0,0,0.12)'}}>
            {matches.map(n=>(
              <div key={n} style={{padding:'6px 11px',fontSize:13,cursor:'pointer',borderBottom:'1px solid #f3f4f6'}}
                onMouseDown={e=>{e.preventDefault();addToken(n);}}>
                {n}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // Single-value autocomplete
  if(autoList){
    const q=(acInput||value||'').toLowerCase();
    const matches=q.length>=1?autoList.filter(n=>n.toLowerCase().includes(q)).slice(0,8):[];
    return(
      <div style={{position:'relative'}} ref={acRef}>
        <label className="fl">{label}</label>
        <input className="fi" value={value||''} placeholder={placeholder||'Type to search faculty…'}
          onChange={e=>{onChange(e.target.value);setAcInput(e.target.value);setAcOpen(true);}}
          onFocus={()=>setAcOpen(true)}
          onBlur={()=>setTimeout(()=>setAcOpen(false),200)}/>
        {acOpen&&matches.length>0&&(
          <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'#fff',border:'1.5px solid #059669',borderRadius:'0 0 7px 7px',maxHeight:180,overflowY:'auto',boxShadow:'0 4px 16px rgba(0,0,0,0.12)'}}>
            {matches.map(n=>(
              <div key={n} style={{padding:'6px 11px',fontSize:13,cursor:'pointer',borderBottom:'1px solid #f3f4f6'}}
                onMouseDown={e=>{e.preventDefault();onChange(n);setAcInput('');setAcOpen(false);}}>
                {n}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }
  return(
    <div>
      <label className="fl">{label}</label>
      {readOnly
        ?<span className="fa">{value||'—'}</span>
        :options
          ?<select className="fi" value={value||''} onChange={e=>onChange(e.target.value)}>
            <option value="">— select —</option>
            {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
          </select>
          :rows
            ?<textarea className="fi" value={value||''} onChange={e=>onChange(e.target.value)} rows={rows} style={{resize:'vertical'}}/>
            :<input className="fi" type={type} value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder||''}/>
      }
    </div>
  );
}

// ── Delete Dialog (with notes) ──────────────────────────────────────────────
function DeleteWithNotesDialog({message,entityType,entityName,entityData,onConfirm,onCancel}){
  const [notes,setNotes]=useState('');
  const [saving,setSaving]=useState(false);
  const doDelete=async()=>{
    setSaving(true);
    await onConfirm(notes);
    setSaving(false);
  };
  return(
    <div className="modal-bg" style={{zIndex:900}}>
      <div style={{background:'#fff',borderRadius:12,padding:28,maxWidth:440,width:'100%'}}>
        <div style={{fontSize:32,marginBottom:12,textAlign:'center'}}>⚠️</div>
        <div style={{fontSize:14,textAlign:'center',marginBottom:16,lineHeight:1.6}}>{message}</div>
        <div style={{marginBottom:12}}>
          <label className="fl">Reason / Notes (optional)</label>
          <textarea className="fi" value={notes} onChange={e=>setNotes(e.target.value)} rows={3}
            placeholder="Why is this being deleted? e.g. Faculty retired, duplicate entry, left university…"
            style={{resize:'vertical'}}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-r" onClick={doDelete} disabled={saving} style={{flex:1,justifyContent:'center',opacity:saving?0.7:1}}>{saving?'Deleting…':'🗑 Delete'}</button>
          <button className="btn btn-o" onClick={onCancel} style={{flex:1,justifyContent:'center'}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('committee');
  const [gfrData,setGfrData]=useState([]);
  const [requests,setRequests]=useState([]);
  const [students,setStudents]=useState([]);
  const [programs,setPrograms]=useState([]);
  const [advisors,setAdvisors]=useState([]);
  const [departments,setDepartments]=useState([]);
  const [faculty,setFaculty]=useState([]);
  const [deletionLog,setDeletionLog]=useState([]);
  const [loading,setLoading]=useState(true);
  const [seeding,setSeeding]=useState(false);
  const [seedProg,setSeedProg]=useState('');
  const [error,setError]=useState(null);
  const [notif,setNotif]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [backingUp,setBackingUp]=useState(false);
  const [showBackupModal,setShowBackupModal]=useState(false);
  const [nextPopup,setNextPopup]=useState(null);
  const [confirmDlg,setConfirmDlg]=useState(null);
  const [deleteDlg,setDeleteDlg]=useState(null);
  const autoBackupDone=useRef(false);

  const notify=(msg,type='success')=>{setNotif({msg,type});setTimeout(()=>setNotif(null),4500);};
  const confirm=(msg,cb)=>setConfirmDlg({msg,cb});

  // Faculty name list for autocomplete
  const facultyNames=useMemo(()=>faculty.map(f=>f.name).sort(),[faculty]);

  const gfrWithPending=useMemo(()=>{
    const ids=new Set(requests.filter(r=>r.status==='pending').map(r=>String(r.gfr_id)));
    const declinedMap={};
    requests.filter(r=>['declined','no_response'].includes(r.status)).forEach(r=>{
      declinedMap[String(r.gfr_id)]=(declinedMap[String(r.gfr_id)]||0)+1;
    });
    // Build set of GFR names actively assigned to a student (non-pending)
    const activeGfrNames=new Set();
    (students||[]).forEach(s=>{
      if(s&&typeof s.gfr==='string'&&s.gfr.trim()&&!s.gfr.toLowerCase().includes('(pending)')){
        activeGfrNames.add(normalizeGfrName(s.gfr).toLowerCase());
      }
    });
    return gfrData.map(r=>{
      const hasPending=ids.has(String(r.id));
      const decline=declinedMap[String(r.id)]||0;
      // Override liveStatus: if roster says Active but no student points to them, treat as Free
      let derivedLive=r.liveStatus;
      if(r.liveStatus==='Active'&&!activeGfrNames.has(r.name.toLowerCase())&&!activeGfrNames.has(gfrNameKey(r.name))){
        derivedLive='Free';
      } else if(r.liveStatus==='Free'&&(activeGfrNames.has(r.name.toLowerCase())||activeGfrNames.has(gfrNameKey(r.name)))){
        derivedLive='Active';
      }
      return{...r,hasPendingRequest:hasPending,declineCount:decline,liveStatus:derivedLive};
    });
  },[gfrData,requests,students]);

  const loadData=useCallback(async()=>{
    try{
      setLoading(true);setError(null);
      const [gfrs,reqs,studs,progs,advs,depts,facs,delLog]=await Promise.all([
        sbGet('gfr_roster','order=name.asc&limit=1000'),
        sbGet('gfr_requests','order=created_at.desc&limit=1000'),
        sbGet('students','order=last_name.asc&limit=1000'),
        sbGet('programs','order=name.asc'),
        sbGet('advisors','order=college_code.asc'),
        sbGet('departments','order=name.asc'),
        sbGet('faculty','order=name.asc&limit=2000').catch(()=>[]),
        sbGet('deletion_log','order=deleted_at.desc&limit=500').catch(()=>[]),
      ]);
      setGfrData(gfrs.map(withLive));
      setRequests(reqs);
      setStudents(studs);
      setPrograms(progs);
      setAdvisors(advs);
      setDepartments(depts);
      setFaculty(facs);
      setDeletionLog(delLog);
      // Update global caches
      _programs=progs;_advisors=advs;_departments=depts;
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{
    if(!loading&&(gfrData.length>0||students.length>0)&&!autoBackupDone.current&&shouldAutoBackup()){
      autoBackupDone.current=true;
      setTimeout(()=>setShowBackupModal(true),1500);
    }
  },[loading,gfrData,students]);

  const seedTable=async(which)=>{
    if(!window.confirm('Load seed data into Supabase? Only do this once.'))return;
    setSeeding(true);
    try{
      if(which==='gfr'||which==='all'){
        for(let i=0;i<SEED_DATA.length;i+=50){
          const chunk=SEED_DATA.slice(i,i+50).map(r=>({name:r.name||'',college:r.college||'',title:r.title||'',department:r.department||'',notes:r.notes||'',status:r.status||'Free',current_student:r.current_student||'',current_student_college:r.current_student_college||'',grad_expected:r.grad_expected||'',grad_dt:r.grad_dt||null,program:r.program||''}));
          setSeedProg('Loading GFR faculty... '+Math.min(i+50,SEED_DATA.length)+' / '+SEED_DATA.length);
          await sbPost('gfr_roster',chunk);
        }
      }
      if(which==='students'||which==='all'){
        for(let i=0;i<STUDENTS_DATA.length;i+=50){
          setSeedProg('Loading students... '+Math.min(i+50,STUDENTS_DATA.length)+' / '+STUDENTS_DATA.length);
          await sbPost('students',STUDENTS_DATA.slice(i,i+50));
        }
      }
      if(which==='faculty'||which==='all'){
        const fsd=typeof FACULTY_SEED_DATA!=='undefined'?FACULTY_SEED_DATA:[];
        for(let i=0;i<fsd.length;i+=50){
          setSeedProg('Loading faculty directory... '+Math.min(i+50,fsd.length)+' / '+fsd.length);
          await sbPost('faculty',fsd.slice(i,i+50));
        }
      }
      setSeeding(false);setSeedProg('');
      notify('Loaded all data successfully!');
      await loadData();
    }catch(e){setSeeding(false);setSeedProg('');notify('Seeding failed: '+e.message,'error');}
  };

  useEffect(()=>{loadData();},[loadData]);

  // ── GFR operations ─────────────────────────────────────────────────────────
  const updateGFR=useCallback(async(id,patch)=>{
    try{
      const clean=toDbPatch(patch);
      const updated=await sbPatch('gfr_roster',id,clean);
      setGfrData(prev=>prev.map(r=>r.id===id?withLive({...r,...clean,...(updated[0]||{})}):r));
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[]);

  const appendGfrNote=useCallback(async(gfr,text)=>{
    if(!gfr||!text)return;
    const existing=(gfr.notes||'').trim();
    await updateGFR(gfr.id,{name:gfr.name,college:gfr.college,title:gfr.title,department:gfr.department,status:gfr.status,current_student:gfr.current_student||'',current_student_college:gfr.current_student_college||'',grad_expected:gfr.grad_expected||'',grad_dt:gfr.grad_dt||null,program:gfr.program||'',notes:existing?existing+'\n'+text:text});
  },[updateGFR]);

  const addGFR=useCallback(async(rec)=>{
    try{const res=await sbPost('gfr_roster',[rec]);if(res&&res[0])setGfrData(prev=>[...prev,withLive(res[0])].sort((a,b)=>a.name.localeCompare(b.name)));notify('Added '+rec.name);}
    catch(e){notify('Add failed: '+e.message,'error');}
  },[]);

  const deleteGFR=useCallback((id,name)=>{
    const gfr=gfrData.find(r=>r.id===id);
    setDeleteDlg({message:'Delete '+name+' from the GFR roster?',entityType:'gfr',entityName:name,entityData:gfr||{},
      onConfirm:async(notes)=>{
        try{
          await sbPost('deletion_log',[{entity_type:'gfr',entity_name:name,entity_data:gfr||{},notes:notes||''}]);
          await sbDelete('gfr_roster',id);
          setGfrData(prev=>prev.filter(r=>r.id!==id));
          setDeletionLog(prev=>[{entity_type:'gfr',entity_name:name,entity_data:gfr||{},notes:notes||'',deleted_at:new Date().toISOString()},...prev]);
          notify('Deleted '+name);
          setDeleteDlg(null);
        }catch(e){notify('Delete failed: '+e.message,'error');setDeleteDlg(null);}
      }
    });
  },[gfrData]);

  // ── Student operations ─────────────────────────────────────────────────────
  const updateStudent=useCallback(async(id,patch)=>{
    try{
      const {id:_id,created_at:_ca,...cleanPatch}=patch;
      const updated=await sbPatch('students',id,cleanPatch);
      setStudents(prev=>prev.map(s=>s.id===id?{...s,...cleanPatch,...(updated[0]||{})}:s));
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[]);

  const addStudent=useCallback(async(rec)=>{
    try{const res=await sbPost('students',[rec]);if(res&&res[0])setStudents(prev=>[...prev,res[0]].sort((a,b)=>a.last_name.localeCompare(b.last_name)));notify('Added '+rec.full_name);}
    catch(e){notify('Add failed: '+e.message,'error');}
  },[]);

  const deleteStudent=useCallback((id,name)=>{
    const student=students.find(s=>s.id===id);
    setDeleteDlg({message:'Delete student '+name+'?',entityType:'student',entityName:name,entityData:student||{},
      onConfirm:async(notes)=>{
        try{
          // Clean up GFR roster if student had a GFR
          if(student&&student.gfr){
            const gfrName=normalizeGfrName(student.gfr);
            const gfr=gfrData.find(r=>{
              if(!r.current_student)return false;
              return r.current_student===student.full_name||
                     r.current_student===(student.last_name+', '+student.first_name)||
                     r.name.toLowerCase()===gfrName.toLowerCase()||
                     gfrNameKey(r.name)===gfrNameKey(gfrName);
            });
            if(gfr&&(gfr.liveStatus==='Active'||gfr.status==='Active')){
              const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
              const note='Student '+name+' deleted on '+today+' — GFR reset to Free';
              const existing=(gfr.notes||'').trim();
              await updateGFR(gfr.id,{name:gfr.name,college:gfr.college,title:gfr.title,department:gfr.department,
                status:'Free',current_student:'',current_student_college:'',grad_expected:'',grad_dt:null,program:'',
                notes:existing?existing+'\n'+note:note});
            }
          }
          await sbPost('deletion_log',[{entity_type:'student',entity_name:name,entity_data:student||{},notes:notes||''}]);
          await sbDelete('students',id);
          setStudents(prev=>prev.filter(s=>s.id!==id));
          setDeletionLog(prev=>[{entity_type:'student',entity_name:name,entity_data:student||{},notes:notes||'',deleted_at:new Date().toISOString()},...prev]);
          notify('Deleted '+name);
          setDeleteDlg(null);
        }catch(e){notify('Delete failed: '+e.message,'error');setDeleteDlg(null);}
      }
    });
  },[students,gfrData,updateGFR]);

  // ── Request operations ─────────────────────────────────────────────────────
  const addRequest=useCallback(async(req)=>{
    try{const res=await sbPost('gfr_requests',[req]);if(res&&res[0])setRequests(prev=>[res[0],...prev]);return res&&res[0];}
    catch(e){notify('Request save failed: '+e.message,'error');return null;}
  },[]);

  const patchRequest=useCallback(async(id,patch)=>{
    try{await sbPatch('gfr_requests',id,patch);setRequests(prev=>prev.map(r=>r.id===id?{...r,...patch}:r));}
    catch(e){notify('Update failed: '+e.message,'error');}
  },[]);

  const handleAccept=useCallback(async(req)=>{
    const gfr=gfrData.find(r=>String(r.id)===String(req.gfr_id));
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const note='Accepted GFR request for '+req.student_name+' on '+today;
    const gradDt=parseGradDate(req.grad_expected||'',req.anticipated_grad||'');
    if(gfr){
      const existing=(gfr.notes||'').trim();
      await updateGFR(gfr.id,{name:gfr.name,college:gfr.college,title:gfr.title,department:gfr.department,grad_dt:gradDt||gfr.grad_dt||null,status:'Active',current_student:req.student_name||'',current_student_college:req.student_college||'',grad_expected:req.grad_expected||'',program:req.student_program||'',notes:existing?existing+'\n'+note:note});
    }
    await patchRequest(req.id,{status:'accepted'});
    notify('✅ '+req.gfr_name+' accepted — status set to Active');
  },[gfrData,updateGFR,patchRequest]);

  const handleDecline=useCallback(async(req,outcome)=>{
    const gfr=gfrData.find(r=>String(r.id)===String(req.gfr_id));
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const note=outcome==='declined'?'Declined GFR request for '+req.student_name+' on '+today:'No response to GFR request for '+req.student_name+' on '+today+' (48hr passed)';
    await patchRequest(req.id,{status:outcome==='declined'?'declined':'no_response'});
    if(gfr)await appendGfrNote(gfr,note);
    notify((outcome==='declined'?'❌ Declined':'⏰ No reply')+' — finding next candidate…','warning');
    // Build next candidate pool
    const tried=new Set(requests.filter(r=>r.student_name===req.student_name&&(r.status==='pending'||r.status==='declined'||r.status==='no_response')).map(r=>String(r.gfr_id)));
    tried.add(String(req.gfr_id));
    const pool=shuffle(gfrData.filter(r=>r.liveStatus==='Free'&&r.college!==req.student_college&&!tried.has(String(r.id))));
    if(pool.length===0){notify('No more candidates available. Use Find GFR tab.','error');return;}
    setNextPopup({candidates:pool,currentIdx:0,studentInfo:{student_name:req.student_name,student_college:req.student_college,student_program:req.student_program,dissertation:req.dissertation,chair:req.chair||'',cochair:req.cochair||'',grad_expected:req.grad_expected||''}});
  },[gfrData,requests,patchRequest,appendGfrNote]);

  const handleNextSend=useCallback(async(candidate,emailBody)=>{
    if(!nextPopup)return;
    const si=nextPopup.studentInfo;
    const req={gfr_id:String(candidate.id),gfr_name:candidate.name,gfr_college:candidate.college,student_name:si.student_name,student_college:si.student_college,student_program:si.student_program,dissertation:si.dissertation,chair:si.chair||'',cochair:si.cochair||'',grad_expected:si.grad_expected||'',email_body:emailBody,sent_at:new Date().toISOString(),deadline:new Date(Date.now()+48*3600000).toISOString(),status:'pending'};
    const saved=await addRequest(req);
    if(saved){notify('Request sent to '+candidate.name);setNextPopup(null);}
  },[nextPopup,addRequest]);

  const handleNextSkip=useCallback(()=>{
    setNextPopup(prev=>{
      if(!prev)return null;
      const next=prev.currentIdx+1;
      if(next>=prev.candidates.length){notify('No more candidates. Try Find GFR tab.','error');return null;}
      return{...prev,currentIdx:next};
    });
  },[]);

  // ── Settings operations ────────────────────────────────────────────────────
  const updateProgram=useCallback(async(id,patch)=>{
    try{
      await sbPatch('programs',id,patch);
      setPrograms(prev=>prev.map(p=>p.id===id?{...p,...patch}:p));
      _programs=programs.map(p=>p.id===id?{...p,...patch}:p);
      // Cascade to all students in this program
      const prog=programs.find(p=>p.id===id);
      if(prog){
        const toUpdate=students.filter(s=>s.major===prog.code);
        for(const s of toUpdate){
          const updates={};
          if(patch.coordinator)updates.coordinator=patch.coordinator;
          if(patch.department)updates.department=patch.department;
          if(patch.college_name)updates.college_name=patch.college_name;
          if(Object.keys(updates).length>0)await sbPatch('students',s.id,updates);
        }
        if(Object.keys({}).length>0)await loadData();
        else setStudents(prev=>prev.map(s=>s.major===prog.code?{...s,...(patch.coordinator?{coordinator:patch.coordinator}:{}), ...(patch.department?{department:patch.department}:{})}:s));
      }
      notify('Program updated');
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[programs,students,loadData]);

  const updateDepartment=useCallback(async(id,patch)=>{
    try{
      await sbPatch('departments',id,patch);
      setDepartments(prev=>prev.map(d=>d.id===id?{...d,...patch}:d));
      // Cascade chair to students
      const dept=departments.find(d=>d.id===id);
      if(dept&&patch.chair){
        const toUpdate=students.filter(s=>s.department===dept.name);
        for(const s of toUpdate)await sbPatch('students',s.id,{dept_chair:patch.chair});
        setStudents(prev=>prev.map(s=>s.department===dept.name?{...s,dept_chair:patch.chair}:s));
      }
      notify('Department updated');
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[departments,students]);

  const updateAdvisor=useCallback(async(id,patch)=>{
    try{
      await sbPatch('advisors',id,patch);
      setAdvisors(prev=>prev.map(a=>a.id===id?{...a,...patch}:a));
      _advisors=advisors.map(a=>a.id===id?{...a,...patch}:a);
      notify('Advisor updated');
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[advisors]);

  // ── Faculty directory operations ────────────────────────────────────────────
  const addFaculty=useCallback(async(rec)=>{
    try{
      const res=await sbPost('faculty',[rec]);
      if(res&&res[0])setFaculty(prev=>[...prev,res[0]].sort((a,b)=>a.name.localeCompare(b.name)));
      // If GFR eligible, also add to gfr_roster
      if(rec.is_gfr_eligible){
        const existing=gfrData.find(r=>r.name.toLowerCase()===rec.name.toLowerCase());
        if(!existing) await addGFR({name:rec.name,college:rec.college_code||'',title:rec.title||'',department:rec.department||'',notes:'',status:'Free'});
      }
      notify('Added '+rec.name);
    }catch(e){notify('Add failed: '+e.message,'error');}
  },[gfrData,addGFR]);

  const updateFaculty=useCallback(async(id,patch)=>{
    try{
      const old=faculty.find(f=>f.id===id);
      await sbPatch('faculty',id,patch);
      setFaculty(prev=>prev.map(f=>f.id===id?{...f,...patch}:f));
      // If toggling is_gfr_eligible ON, add to gfr_roster if not there
      if(patch.is_gfr_eligible&&(!old||!old.is_gfr_eligible)){
        const existing=gfrData.find(r=>r.name.toLowerCase()===(patch.name||old.name).toLowerCase());
        if(!existing) await addGFR({name:patch.name||old.name,college:patch.college_code||old.college_code||'',title:patch.title||old.title||'',department:patch.department||old.department||'',notes:'',status:'Free'});
      }
      notify('Faculty updated');
    }catch(e){notify('Update failed: '+e.message,'error');}
  },[faculty,gfrData,addGFR]);

  const deleteFaculty=useCallback((id,name)=>{
    const fac=faculty.find(f=>f.id===id);
    setDeleteDlg({message:'Delete faculty member '+name+'?',entityType:'faculty',entityName:name,entityData:fac||{},
      onConfirm:async(notes)=>{
        try{
          await sbPost('deletion_log',[{entity_type:'faculty',entity_name:name,entity_data:fac||{},notes:notes||''}]);
          await sbDelete('faculty',id);
          setFaculty(prev=>prev.filter(f=>f.id!==id));
          setDeletionLog(prev=>[{entity_type:'faculty',entity_name:name,entity_data:fac||{},notes:notes||'',deleted_at:new Date().toISOString()},...prev]);
          notify('Deleted '+name);
          setDeleteDlg(null);
        }catch(e){notify('Delete failed: '+e.message,'error');setDeleteDlg(null);}
      }
    });
  },[faculty]);

  // ── Restore from deletion log ──────────────────────────────────────────────
  const restoreEntry=useCallback(async(logEntry)=>{
    try{
      const d=logEntry.entity_data||{};
      const {id:_,created_at:__,...cleanData}=d;
      if(logEntry.entity_type==='student'&&cleanData.last_name){
        await sbPost('students',[cleanData]);
      } else if(logEntry.entity_type==='gfr'&&cleanData.name){
        await sbPost('gfr_roster',[{name:cleanData.name,college:cleanData.college||'',title:cleanData.title||'',department:cleanData.department||'',notes:(cleanData.notes||'')+'\nRestored on '+new Date().toLocaleDateString(),status:'Free',current_student:'',current_student_college:'',grad_expected:'',grad_dt:null,program:''}]);
      } else if(logEntry.entity_type==='faculty'&&cleanData.name){
        await sbPost('faculty',[cleanData]);
      }
      // Mark as restored
      if(logEntry.id) await sbPatch('deletion_log',logEntry.id,{restored_at:new Date().toISOString()});
      setDeletionLog(prev=>prev.map(l=>l.id===logEntry.id?{...l,restored_at:new Date().toISOString()}:l));
      notify('Restored '+logEntry.entity_name);
      await loadData();
    }catch(e){notify('Restore failed: '+e.message,'error');}
  },[loadData]);

  const handleBackup=async(fromModal=false)=>{
    setBackingUp(true);
    await backupToSharePoint(gfrWithPending,requests,students,notify);
    setBackingUp(false);
    if(fromModal)setShowBackupModal(false);
  };

  const stats=useMemo(()=>{
    // Build quick set of GFR names that have active students (non-pending)
    const activeGfrNames=new Set();
    (students||[]).forEach(s=>{
      if(s&&typeof s.gfr==='string'&&s.gfr.trim()&&!s.gfr.toLowerCase().includes('(pending)')){
        activeGfrNames.add(normalizeGfrName(s.gfr).toLowerCase());
      }
    });
    // Count GFRs whose derived status is Active (has a student) vs Free
    let active=0,free=0;
    gfrData.forEach(r=>{
      const base=r.liveStatus;// from grad_dt auto-expiry
      if(activeGfrNames.has(r.name.toLowerCase())||activeGfrNames.has(gfrNameKey(r.name))){
        active++;
      } else if(base==='Active'&&r.current_student){
        // Stale — roster says Active but no student refs them, count as Free
        free++;
      } else if(base==='Free'){
        free++;
      }
      // Declined stays as-is, not counted in free/active
    });
    return{
      total:gfrData.length,
      free,
      active,
      pending:requests.filter(r=>r.status==='pending').length,
      students:students.length,
      needsGFR:students.filter(s=>!s.gfr||s.gfr.trim()==='').length,
    };
  },[gfrData,requests,students]);

  const backupDue=shouldAutoBackup();
  const lastBackup=localStorage.getItem(LAST_BACKUP_KEY);
  const gfrEmpty=gfrData.length===0;
  const studentsEmpty=students.length===0;

  if(loading)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16}}><div style={{width:40,height:40,border:'3px solid #e5e7eb',borderTop:'3px solid #059669',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/><div style={{color:'#6b7280',fontSize:14}}>Connecting to database...</div></div>);

  if(error)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16,padding:32,textAlign:'center'}}><div style={{fontSize:40}}>⚠️</div><div style={{fontWeight:600,fontSize:16}}>Could not connect</div><div style={{color:'#6b7280',fontSize:13,maxWidth:500,lineHeight:1.7}}>{error}</div><div style={{background:'#f8f7f4',borderRadius:8,padding:'12px 20px',fontSize:12,maxWidth:500,textAlign:'left'}}><strong>Fix:</strong> Go to Supabase → SQL Editor → run the setup SQL files, then refresh.</div><button onClick={loadData} className="btn btn-p" style={{marginTop:8}}>↻ Retry</button></div>);

  return(
    <div style={{fontFamily:"'DM Sans','Helvetica Neue',sans-serif",background:'#f5f4f0',minHeight:'100vh'}}>
      {/* Header */}
      <div style={{background:'#1a1a2e',height:56,display:'flex',alignItems:'center',padding:'0 24px',gap:12,boxShadow:'0 2px 12px rgba(0,0,0,0.3)',position:'sticky',top:0,zIndex:100}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:'#10b981',flexShrink:0}}/>
        <span style={{color:'#fff',fontWeight:600,fontSize:14,letterSpacing:'0.03em',flexShrink:0}}>GradEd</span>
        <span style={{color:'#475569',fontSize:11,flexShrink:0}}>Doctoral Students · TAMUCC</span>
        <div style={{display:'flex',gap:2,marginLeft:'auto',flexWrap:'nowrap'}}>
          {[['committee','📋 Students'],['faculty','🎓 GFR Faculty'],['tracking','🔄 Requests'],['settings','⚙️ Settings'],['trash','🗑 Trash']].map(([v,label])=>(
            <button key={v} onClick={()=>setView(v)} className="btn"
              style={{background:view===v?'#10b981':'transparent',color:view===v?'#fff':'#94a3b8',padding:'5px 12px',fontSize:12}}>
              {label}
              {v==='tracking'&&stats.pending>0&&<span style={{background:'#ef4444',color:'#fff',borderRadius:10,padding:'1px 5px',fontSize:10,marginLeft:4}}>{stats.pending}</span>}
              {v==='trash'&&deletionLog.filter(l=>!l.restored_at).length>0&&<span style={{background:'#6b7280',color:'#fff',borderRadius:10,padding:'1px 5px',fontSize:10,marginLeft:4}}>{deletionLog.filter(l=>!l.restored_at).length}</span>}
            </button>
          ))}
        </div>
        <button onClick={loadData} className="btn" style={{background:'transparent',color:'#94a3b8',padding:'5px 8px',fontSize:16,flexShrink:0}} title="Refresh">↻</button>
      </div>

      {/* Toast notification - bottom right */}
      {notif&&<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:notif.type==='success'?'#059669':notif.type==='warning'?'#d97706':'#ef4444',color:'#fff',padding:'10px 16px',borderRadius:8,fontSize:13,fontWeight:500,boxShadow:'0 4px 16px rgba(0,0,0,0.2)',animation:'slideIn 0.2s ease',maxWidth:420}}>{notif.msg}</div>}

      {/* Modals */}
      {confirmDlg&&<ConfirmDialog message={confirmDlg.msg} onConfirm={confirmDlg.cb} onCancel={()=>setConfirmDlg(null)}/>}
      {deleteDlg&&<DeleteWithNotesDialog message={deleteDlg.message} entityType={deleteDlg.entityType} entityName={deleteDlg.entityName} entityData={deleteDlg.entityData} onConfirm={deleteDlg.onConfirm} onCancel={()=>setDeleteDlg(null)}/>}
      {showBackupModal&&<BackupModal lastBackup={lastBackup} onBackup={()=>handleBackup(true)} onDismiss={()=>setShowBackupModal(false)} backing={backingUp}/>}
      {seeding&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{background:'#fff',borderRadius:12,padding:32,textAlign:'center',maxWidth:360}}><div style={{width:40,height:40,border:'3px solid #e5e7eb',borderTop:'3px solid #059669',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}}/><div style={{fontWeight:600,marginBottom:8}}>Loading data into Supabase</div><div style={{fontSize:13,color:'#6b7280'}}>{seedProg}</div></div></div>}
      {nextPopup&&nextPopup.candidates[nextPopup.currentIdx]&&<NextCandidatePopup candidate={nextPopup.candidates[nextPopup.currentIdx]} studentInfo={nextPopup.studentInfo} totalCandidates={nextPopup.candidates.length} currentIdx={nextPopup.currentIdx} onSend={handleNextSend} onSkip={handleNextSkip} onClose={()=>setNextPopup(null)}/>}
      {showAdd&&<AddGFRModal programs={programs} departments={departments} onClose={()=>setShowAdd(false)} onSave={async r=>{await addGFR(r);setShowAdd(false);}}/>}

      <div style={{maxWidth:1500,margin:'0 auto',padding:'0 24px 20px'}}>
        {/* Action buttons (faculty view) */}
        {view==='faculty'&&(
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',flexWrap:'wrap',alignItems:'center',paddingTop:20,marginBottom:4}}>

// ── Faculty List ──────────────────────────────────────────────────────────────
function FacultyView({gfrData,students,updateGFR,deleteGFR,departments,programs,notify,facultyNames}){
  const [search,setSearch]=useState('');
  const [fStatus,setFStatus]=useState('All');
  const [fCollege,setFCollege]=useState('All');
  const [sort,setSort]=useState('name');
  const [expanded,setExpanded]=useState(null);
  const colleges=['All',...Object.keys(COLLEGE_MAP)];

  // Build live assignment map: GFR roster name → student(s) from the students table
  const liveAssignments=useMemo(()=>{
    const map={};// gfr roster name (lowercase) → {student, program, college, grad}
    const rosterMap={};
    gfrData.forEach(r=>{rosterMap[r.name.toLowerCase()]=r.name;});
    (students||[]).forEach(s=>{
      if(!s||!s.gfr||typeof s.gfr!=='string'||!s.gfr.trim())return;
      // Strip "(pending)" suffix for matching
      const raw=s.gfr.replace(/\s*\(pending\)\s*$/i,'').trim();
      if(!raw)return;
      const canonical=normalizeGfrName(raw);
      // Try exact match first
      let rosterName=rosterMap[canonical.toLowerCase()];
      // Try key-based fuzzy match
      if(!rosterName){
        const key=gfrNameKey(canonical);
        Object.keys(rosterMap).forEach(k=>{
          if(gfrNameKey(k)===key)rosterName=rosterMap[k];
        });
      }
      // Try last-name fallback
      if(!rosterName){
        const last=canonical.split(' ').pop().toLowerCase();
        const matches=Object.keys(rosterMap).filter(k=>k.split(' ').pop()===last);
        if(matches.length===1)rosterName=rosterMap[matches[0]];
      }
      if(rosterName){
        const lk=rosterName.toLowerCase();
        if(!map[lk])map[lk]=[];
        map[lk].push({studentName:s.full_name||s.last_name+', '+s.first_name,college:s.college_code,program:s.program_name||s.major,grad:s.anticipated_grad||'',isPending:s.gfr.toLowerCase().includes('(pending)')});
      }
    });
    return map;
  },[gfrData,students]);

  // Enrich GFR data with live assignment info
  const enriched=useMemo(()=>gfrData.map(r=>{
    const assigns=liveAssignments[r.name.toLowerCase()]||[];
    const activeAssign=assigns.find(a=>!a.isPending);
    const pendingAssign=assigns.find(a=>a.isPending);
    // Derive status from students table: if a student has this GFR (non-pending), they're Active
    let derivedStatus=r.liveStatus;
    let derivedStudent=r.displayStudent;
    let derivedGrad=r.displayGrad;
    let derivedProgram=r.displayProgram;
    let derivedStudentCollege=r.displayStudentCollege;
    if(activeAssign){
      derivedStatus='Active';
      derivedStudent=activeAssign.studentName;
      derivedGrad=activeAssign.grad;
      derivedProgram=activeAssign.program;
      derivedStudentCollege=activeAssign.college;
    } else if(!activeAssign&&r.liveStatus==='Active'&&r.current_student){
      // GFR roster says Active but no student references them — stale data, show as Free
      derivedStatus='Free';
      derivedStudent='';
      derivedGrad='';
      derivedProgram='';
      derivedStudentCollege='';
    }
    return{...r,derivedStatus,derivedStudent,derivedGrad,derivedProgram,derivedStudentCollege,liveAssigns:assigns};
  }),[gfrData,liveAssignments]);

  const filtered=useMemo(()=>enriched.filter(r=>{
    if(fStatus==='Pending'&&!r.hasPendingRequest)return false;
    if(fStatus!=='All'&&fStatus!=='Pending'&&r.derivedStatus!==fStatus)return false;
    if(fCollege!=='All'&&r.college!==fCollege)return false;
    if(search){const q=search.toLowerCase();return r.name.toLowerCase().includes(q)||(r.department||'').toLowerCase().includes(q)||(r.college||'').toLowerCase().includes(q)||(r.notes||'').toLowerCase().includes(q)||(r.derivedStudent||'').toLowerCase().includes(q);}
    return true;
  }).sort((a,b)=>{if(sort==='name')return a.name.localeCompare(b.name);if(sort==='college')return(a.college||'').localeCompare(b.college||'');if(sort==='status')return a.derivedStatus.localeCompare(b.derivedStatus);return 0;}),[enriched,search,fStatus,fCollege,sort]);

  // Live filtered stats (reflect current filters)
  const liveStats=useMemo(()=>({
    total:filtered.length,
    free:filtered.filter(r=>r.derivedStatus==='Free').length,
    active:filtered.filter(r=>r.derivedStatus==='Active').length,
    pending:filtered.filter(r=>r.hasPendingRequest).length,
  }),[filtered]);

  return(<div>
    {/* Stats + Filter row — sticky together below page header */}
    <div style={{position:'sticky',top:56,zIndex:80,background:'#f5f4f0',paddingTop:20,paddingBottom:12,marginBottom:4}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:10}}>
        {[['Showing',liveStats.total,'#1a1a2e','#fff','#fff'],['Free',liveStats.free,'#d1fae5','#065f46','#059669'],['Active',liveStats.active,'#fef3c7','#92400e','#d97706'],['Pending Req.',liveStats.pending,liveStats.pending>0?'#dbeafe':'#f9fafb',liveStats.pending>0?'#1e3a8a':'#6b7280','#2563eb']].map(([label,val,bg,fg,accent])=>(
          <div key={label} style={{background:bg,color:fg,borderRadius:10,padding:'10px 16px',flex:1,minWidth:80,borderLeft:'3px solid '+accent}}>
            <div style={{fontSize:20,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{val}</div>
            <div style={{fontSize:11,opacity:0.75,marginTop:1}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, dept, college, notes…" className="fi" style={{flex:1,minWidth:200}}/>
        <select value={fStatus} onChange={e=>setFStatus(e.target.value)} className="fi" style={{width:'auto'}}>
          {['All','Free','Active','Declined','Pending'].map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={fCollege} onChange={e=>setFCollege(e.target.value)} className="fi" style={{width:'auto'}}>
          {colleges.map(c=><option key={c}>{c}</option>)}
        </select>
        <select value={sort} onChange={e=>setSort(e.target.value)} className="fi" style={{width:'auto'}}>
          <option value="name">Sort: Name</option><option value="college">Sort: College</option><option value="status">Sort: Status</option>
        </select>
        <span style={{color:'#9ca3af',fontSize:12,whiteSpace:'nowrap'}}>{filtered.length} of {gfrData.length}</span>
      </div>
    </div>
    <div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{background:'#f8f7f4',borderBottom:'1.5px solid #e5e7eb'}}>
          {['Professor','College','Department','Title','Status','Assignment','Notes',''].map(h=>(
            <th key={h} style={{padding:'9px 13px',textAlign:'left',fontWeight:600,color:'#374151',fontSize:12,whiteSpace:'nowrap'}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {filtered.map((row,i)=>{
            const sc=STATUS_CFG[row.derivedStatus]||STATUS_CFG.Free;
            const isExp=expanded===row.id;
            return[
              <tr key={row.id} className="rh" onClick={()=>setExpanded(isExp?null:row.id)} style={{borderBottom:'1px solid #f3f4f6',cursor:'pointer',background:i%2===0?'#fff':'#fafafa'}}>
                <td style={{padding:'9px 13px',fontWeight:500,fontSize:14}}>
                  {row.name}
                  {row.declineCount>0&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b',marginLeft:6,fontSize:10}}>{'↓'.repeat(Math.min(row.declineCount,3))} {row.declineCount} declined</span>}
                </td>
                <td style={{padding:'9px 13px'}}><span style={{background:'#e5e7eb',color:'#374151',borderRadius:4,padding:'2px 7px',fontSize:12,fontFamily:"'DM Mono',monospace"}}>{row.college}</span></td>
                <td style={{padding:'9px 13px',color:'#6b7280',fontSize:13}}>{row.department}</td>
                <td style={{padding:'9px 13px',color:'#9ca3af',fontSize:13}}>{row.title}</td>
                <td style={{padding:'9px 13px',minWidth:120}}>
                  <span className="badge" style={{background:sc.bg,color:sc.color}}>{sc.label}</span>
                  {row.hasPendingRequest&&<span className="badge" style={{background:PENDING_CFG.bg,color:PENDING_CFG.color,display:'block',marginTop:4}}>✉ Pending</span>}
                </td>
                <td style={{padding:'9px 13px',fontSize:13}}>
                  {row.derivedStatus==='Active'&&row.derivedStudent
                    ?<div><div style={{fontWeight:500}}>{row.derivedStudent}</div>{row.derivedGrad&&<div style={{color:'#d97706',fontSize:12}}>Grad: {row.derivedGrad}</div>}{row.derivedProgram&&<div style={{color:'#9ca3af',fontSize:12}}>{row.derivedProgram}</div>}</div>
                    :<span style={{color:'#d1d5db'}}>—</span>}
                </td>
                <td style={{padding:'9px 13px',color:'#9ca3af',fontSize:12,maxWidth:160}}>
                  {row.notes?<span title={row.notes} style={{display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:150}}>{row.notes.split('\n')[0]}</span>:<span style={{color:'#e5e7eb'}}>—</span>}
                </td>
                <td style={{padding:'9px 13px',color:'#9ca3af'}}>{isExp?'▲':'▼'}</td>
              </tr>,
              isExp&&(<tr key={row.id+'_e'} style={{borderBottom:'1px solid #e5e7eb'}}><td colSpan={8} style={{padding:'16px 20px',background:'#f8f7f4'}}>
                <GFRDetail row={row} updateGFR={updateGFR} deleteGFR={deleteGFR} departments={departments} notify={notify} onClose={()=>setExpanded(null)} facultyNames={facultyNames}/>
              </td></tr>)
            ];
          })}
        </tbody>
      </table>
      {filtered.length===0&&<div style={{textAlign:'center',padding:40,color:'#9ca3af'}}>No results found</div>}
    </div>
  </div>);
}

function FindGFRView({gfrData,updateGFR,addRequest,requests,programs,notify}){

    const prog=programs.find(p=>p.code===v||p.name===v);

  };

  const buildEmail=(gfr,frm)=>{
    const ln=gfr.name.split(' ').pop();

      ?'The anticipated proposal hearing is for '+frm.proposalDate+', but your'
      :'Your';
