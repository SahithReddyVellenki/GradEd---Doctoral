      'Dr. '+ln+',','',
      frm.studentName+', a doctoral student in the '+(frm.studentProgram||frm.studentCollege)+' program, needs a Graduate Faculty Representative for their dissertation advisory committee and your participation is requested.','',
      'You are receiving this request because you are now eligible to serve as a Graduate Faculty Representative with the changes made to the newly approved Graduate Committee Membership policy. (__12.99.99.c0.03-graduate-committee-membership__)','',
      'Below is some text regarding this responsibility that can provide some additional information.','',
      'The committee chair is '+frm.chair+(frm.cochair?', Co-Chair is '+frm.cochair:'')+memberPart+' and the dissertation title is "'+frm.dissertation+'"','',
      proposalLine+' response within __two business days__ would be greatly appreciated. Thank you, in advance, for considering this request. Please let me know if you have any questions!','','',
      'Doctoral Committee',
      "The student will choose a doctoral committee chair from among the regular graduate faculty members of the doctoral program. Doctoral committees will be composed of a minimum of four Texas A&M University-Corpus Christi graduate faculty members and will include the doctoral committee chair, two other graduate faculty members, and a Graduate Faculty Representative, selected from a different department or college/school. The Associate Provost will officially appoint the doctoral committee. Normally, the student's committee chair and the committee members recommended by the student and the chair will be faculty members from the program offering the degree. Persons with unique and appropriate expertise may be appointed to the dissertation committee upon approval of the Associate Provost for the dissertation portion of the doctoral program. All doctoral committee members representing the student's discipline may be required to review and approve degree plans and participate in qualifying examinations, proposal hearings, comprehensive and final examinations, including defense of dissertation, and all are required to sign relevant documents. More than one dissenting vote in the dissertation defense/final examination will constitute failure. The Graduate Faculty Representative will not be required to attend or evaluate materials related to the comprehensive examination.",'',
      'Graduate Faculty Representative',
      "The Graduate Faculty Representative helps ensure the quality of the graduate degree is appropriate for Texas A&M University-Corpus Christi and that students receive fair and reasonable treatment in their graduate experience. All committee members will be provided a copy of the proposal and the dissertation allowing for a two-week turnaround before the scheduled proposal and defense/final examination.",'',
      'Regards,','Sahith Reddy Vellenki.'
    ].join('\n');
  };;

  const selectCandidate=gfr=>{setSelected(gfr);setEmailBody(buildEmail(gfr,form));setStep(3);};
  const openOutlook=()=>window.location.href='mailto:?subject='+encodeURIComponent('GFR Request – '+form.studentName)+'&body='+encodeURIComponent(emailBody);

  const logRequest=async()=>{
    setSending(true);
    const req={gfr_id:String(selected.id),gfr_name:selected.name,gfr_college:selected.college,student_name:form.studentName,student_college:form.studentCollege,student_program:form.studentProgram,dissertation:form.dissertation,chair:form.chair,cochair:form.cochair,members:form.members,grad_expected:form.gradExpected,email_body:emailBody,sent_at:new Date().toISOString(),deadline:new Date(Date.now()+48*3600000).toISOString(),status:'pending'};
    const saved=await addRequest(req);
    if(saved){notify('Logged — '+selected.name+' marked Pending');setStep(1);setForm({studentName:'',studentId:'',studentCollege:'',studentProgram:'',dissertation:'',chair:'',cochair:'',members:'',proposalDate:'',gradExpected:''});setCandidates([]);setSelected(null);setEmailBody('');}
    setSending(false);
  };

  return(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
    <div>
      <div style={{display:'flex',alignItems:'center',marginBottom:20}}>
        {[['1','Details'],['2','Pick GFR'],['3','Send']].map(([n,label],i)=>(
          <div key={n} style={{display:'flex',alignItems:'center',flex:1}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1}}>
              <div style={{width:26,height:26,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,background:step>=parseInt(n)?'#1a1a2e':'#e5e7eb',color:step>=parseInt(n)?'#fff':'#9ca3af'}}>{n}</div>
              <span style={{fontSize:11,marginTop:3,color:step>=parseInt(n)?'#1a1a2e':'#9ca3af'}}>{label}</span>
            </div>
            {i<2&&<div style={{width:24,height:2,flexShrink:0,marginBottom:16,background:step>i+1?'#059669':'#e5e7eb'}}/>}
          </div>
        ))}
      </div>

      {step===1&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',padding:20}}>
        <h3 style={{margin:'0 0 14px',fontSize:14}}>Student & Thesis Details</h3>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Field label="Student Name *" value={form.studentName} onChange={f('studentName')}/>
          <Field label="Program *" value={form.studentProgram} onChange={onProgramChange} options={progOpts}/>
          <div>
            <label className="fl">Student College (auto-filled)</label>
            <span className="fa">{form.studentCollege?form.studentCollege+' — '+(COLLEGE_MAP[form.studentCollege]||form.studentCollege):'Select a program above'}</span>
          </div>
          <Field label="Committee Chair *" value={form.chair} onChange={f('chair')}/>
          <Field label="Co-Chair (optional)" value={form.cochair} onChange={f('cochair')}/>
          <Field label="Other Committee Members" value={form.members} onChange={f('members')}/>
          <Field label="Anticipated Graduation" value={form.gradExpected} onChange={f('gradExpected')}/>
          <Field label="Proposed Hearing Date" value={form.proposalDate} onChange={f('proposalDate')}/>
          <Field label="Dissertation Title *" value={form.dissertation} onChange={f('dissertation')} rows={3}/>
          <button className="btn btn-p" onClick={findCandidates} style={{width:'100%',justifyContent:'center',padding:11}}>Find GFR Candidates →</button>
        </div>
      </div>}

      {step===2&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 style={{margin:0,fontSize:14}}>Suggested GFRs <span style={{color:'#9ca3af',fontSize:12,fontWeight:400}}>(randomized)</span></h3>
          <button className="btn btn-o btn-sm" onClick={()=>setStep(1)}>← Back</button>
        </div>
        <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:7,padding:'8px 12px',fontSize:12,color:'#065f46',marginBottom:12}}>
          Free professors from a different college than <strong>{form.studentCollege}</strong> · {candidates.length} found ·
          <span style={{color:'#047857',cursor:'pointer',textDecoration:'underline',marginLeft:6}} onClick={findCandidates}>🔀 Reshuffle</span>
        </div>
        {candidates.length===0?<div style={{textAlign:'center',padding:32,color:'#9ca3af'}}>No eligible GFRs available.</div>:candidates.map(gfr=>(
          <div key={gfr.id} onClick={()=>selectCandidate(gfr)} style={{border:'1.5px solid #e5e7eb',borderRadius:8,padding:'11px 13px',marginBottom:8,cursor:'pointer',transition:'all 0.12s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#059669';e.currentTarget.style.background='#f0fdf4';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#e5e7eb';e.currentTarget.style.background='#fff';}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{gfr.name}{gfr.declineCount>0&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b',marginLeft:6,fontSize:10}}>{gfr.declineCount}× declined before</span>}</div>
                <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>{gfr.college} · {gfr.department}</div>
              </div>
              <span className="badge" style={{background:'#d1fae5',color:'#065f46'}}>Select →</span>
            </div>
          </div>
        ))}
      </div>}

      {step===3&&selected&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 style={{margin:0,fontSize:14}}>Confirm & Send</h3>
          <button className="btn btn-o btn-sm" onClick={()=>setStep(2)}>← Back</button>
        </div>
        <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,padding:'10px 14px',marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:600,color:'#065f46'}}>To: {selected.name}</div>
          <div style={{fontSize:12,color:'#047857'}}>{selected.college} · {selected.department}</div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button className="btn btn-o" style={{flex:1,justifyContent:'center',fontSize:12}} onClick={()=>navigator.clipboard.writeText(emailBody).then(()=>notify('Copied!'))}>📋 Copy</button>
          <button className="btn btn-b" style={{flex:1,justifyContent:'center',fontSize:12}} onClick={openOutlook}>📧 Open in Outlook</button>
        </div>
        <button className="btn btn-g" onClick={logRequest} disabled={sending} style={{width:'100%',justifyContent:'center',padding:11,opacity:sending?0.7:1}}>{sending?'Saving…':'✓ Log Request & Mark as Pending'}</button>
      </div>}
    </div>

    <div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',overflow:'hidden',display:'flex',flexDirection:'column'}}>
      <div style={{background:'#f8f7f4',padding:'10px 14px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,fontWeight:600}}>Email Preview</span>
        {emailBody&&<div style={{display:'flex',gap:6}}>
          <button className="btn btn-o btn-sm" onClick={()=>navigator.clipboard.writeText(emailBody).then(()=>notify('Copied!'))}>Copy</button>
          <button className="btn btn-b btn-sm" onClick={openOutlook}>Open in Outlook</button>
        </div>}
      </div>
      {emailBody?<textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)} style={{flex:1,minHeight:520,padding:16,border:'none',fontSize:12,fontFamily:"'DM Mono','Courier New',monospace",lineHeight:1.7,resize:'none',color:'#374151'}}/>:<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#9ca3af',gap:8}}><div style={{fontSize:28}}>✉️</div><div style={{fontSize:12}}>Fill in student details and select a GFR to preview</div></div>}
    </div>
  </div>);
}

// ── Requests / Tracking ───────────────────────────────────────────────────────
function TrackingView({requests,gfrData,handleAccept,handleDecline,notify}){
  const [search,setSearch]=useState('');
  const [fStatus,setFStatus]=useState('pending');
  const [expandedEmail,setExpandedEmail]=useState(null);
  const now=Date.now();
  const tl=d=>{const diff=new Date(d).getTime()-now;if(diff<=0)return{label:'Overdue',color:'#ef4444',overdue:true};const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);return{label:h+'h '+m+'m left',color:h<8?'#f59e0b':'#059669',overdue:false};};

  // Attempt count per student
  const attemptCount=useMemo(()=>{
    const map={};
    requests.forEach(r=>{if(!map[r.student_name])map[r.student_name]=0;map[r.student_name]++;});
    return map;
  },[requests]);

  const filtered=useMemo(()=>requests.filter(r=>{
    if(fStatus!=='all'&&r.status!==fStatus)return false;
    if(search){const q=search.toLowerCase();return(r.student_name||'').toLowerCase().includes(q)||(r.gfr_name||'').toLowerCase().includes(q);}
    return true;
  }),[requests,search,fStatus]);

  const pending=filtered.filter(r=>r.status==='pending');
  const resolved=filtered.filter(r=>r.status!=='pending');

  return(<div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search student or GFR name…" className="fi" style={{flex:1,minWidth:200}}/>
      <select value={fStatus} onChange={e=>setFStatus(e.target.value)} className="fi" style={{width:'auto'}}>
        <option value="pending">Pending Only</option>
        <option value="accepted">Accepted</option>
        <option value="declined">Declined</option>
        <option value="no_response">No Response</option>
        <option value="all">All Requests</option>
      </select>
    </div>

    {(fStatus==='pending'||fStatus==='all')&&<>
      <h3 style={{margin:'0 0 12px',fontSize:14,color:'#1a1a2e'}}>
        Pending Requests
        {pending.length>0&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b',marginLeft:8}}>{pending.length} pending</span>}
      </h3>
      {pending.length===0&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',padding:40,textAlign:'center',color:'#9ca3af',marginBottom:20}}><div style={{fontSize:28,marginBottom:8}}>✓</div>No pending requests</div>}
      {pending.map(req=>{
        const t=tl(req.deadline);
        const attempt=attemptCount[req.student_name]||1;
        return(<div key={req.id} style={{background:'#fff',borderRadius:12,border:'1.5px solid '+(t.overdue?'#fca5a5':'#e5e7eb'),padding:18,marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{req.student_name}
                <span style={{color:'#9ca3af',fontWeight:400,fontSize:12,marginLeft:6}}>{req.student_program||req.student_college}</span>
                <span className="badge" style={{background:'#f3f4f6',color:'#374151',marginLeft:6,fontSize:11}}>Attempt #{attempt}</span>
              </div>
              <div style={{fontSize:12,color:'#6b7280',marginTop:3}}>GFR: <strong>{req.gfr_name}</strong> · {req.gfr_college}</div>
              {req.chair&&<div style={{fontSize:12,color:'#9ca3af',marginTop:2}}>Chair: {req.chair}{req.cochair?' · Co-Chair: '+req.cochair:''}</div>}
              <div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>Sent: {new Date(req.sent_at).toLocaleString()}</div>
            </div>
            <div style={{textAlign:'right'}}><div style={{color:t.color,fontWeight:700,fontSize:14}}>{t.label}</div>{t.overdue&&<div style={{fontSize:11,color:'#ef4444'}}>⚠ Action needed</div>}</div>
          </div>
          {req.dissertation&&<div style={{background:'#f8f7f4',borderRadius:6,padding:'7px 11px',fontSize:11,color:'#374151',marginBottom:10,fontStyle:'italic'}}>"{req.dissertation}"</div>}
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <button onClick={()=>handleAccept(req)} className="btn btn-g" style={{flex:1,justifyContent:'center'}}>✅ Accepted</button>
            <button onClick={()=>handleDecline(req,'declined')} className="btn btn-o" style={{flex:1,justifyContent:'center'}}>❌ Declined → Next</button>
            <button onClick={()=>handleDecline(req,'no_response')} className="btn btn-o" style={{flex:1,justifyContent:'center',color:'#9ca3af'}}>⏰ No Reply → Next</button>
          </div>
          <div style={{fontSize:11,color:'#9ca3af',textAlign:'center'}}>Declining auto-shows next available candidate</div>
        </div>);
      })}
    </>}

    {resolved.length>0&&<>
      <h4 style={{fontSize:12,color:'#9ca3af',margin:'20px 0 10px',textTransform:'uppercase',letterSpacing:'0.06em'}}>Resolved History</h4>
      {resolved.map(req=>(
        <div key={req.id} style={{background:'#fff',borderRadius:8,border:'1px solid #f3f4f6',padding:'10px 14px',marginBottom:6}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:13}}>
              <span style={{fontWeight:500}}>{req.student_name}</span>
              <span style={{color:'#9ca3af',margin:'0 8px'}}>→</span>
              {req.gfr_name}
              <span style={{color:'#9ca3af',fontSize:11,marginLeft:8}}>{new Date(req.sent_at).toLocaleDateString()}</span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button className="btn btn-o btn-sm" onClick={()=>setExpandedEmail(expandedEmail===req.id?null:req.id)}>
                {expandedEmail===req.id?'Hide Email':'📧 View Email'}
              </button>
              <span className="badge" style={{background:req.status==='accepted'?'#d1fae5':req.status==='declined'?'#fee2e2':'#fef3c7',color:req.status==='accepted'?'#065f46':req.status==='declined'?'#991b1b':'#92400e'}}>
                {req.status==='accepted'?'✅ Accepted':req.status==='declined'?'❌ Declined':'⏰ No Response'}
              </span>
            </div>
          </div>
          {expandedEmail===req.id&&req.email_body&&(
            <div style={{marginTop:10,background:'#f8f7f4',borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:11,color:'#9ca3af',textTransform:'uppercase',marginBottom:6}}>Email Sent</div>
              <pre style={{fontSize:11,color:'#374151',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:"'DM Mono','Courier New',monospace"}}>{req.email_body}</pre>
            </div>
          )}
        </div>
      ))}
    </>}
  </div>);
}

// ── GFR Request Modal (from Committee tab) ────────────────────────────────────
function GFRRequestModal({student,gfrData,requests,addRequest,updateStudent,notify,onClose}){
  const [step,setStep]=useState(1);
  const [candidates,setCandidates]=useState([]);
  const [selected,setSelected]=useState(null);
  const [emailBody,setEmailBody]=useState('');
  const [sending,setSending]=useState(false);

  const pendingIds=new Set(requests.filter(r=>r.status==='pending').map(r=>String(r.gfr_id)));
  const triedIds=new Set(requests.filter(r=>r.student_name===student.full_name).map(r=>String(r.gfr_id)));

  const findCandidates=()=>{
    const pool=shuffle(gfrData.filter(r=>
      r.liveStatus==='Free'&&
      r.college!==student.college_code&&
      !pendingIds.has(String(r.id))&&
      !triedIds.has(String(r.id))
    ));
    setCandidates(pool);
    setStep(2);
  };

  const selectCandidate=(gfr)=>{
    setSelected(gfr);
    const ln=gfr.name.split(' ').pop();
    const proposalLine=student.proposal_date?'The anticipated proposal hearing is for '+student.proposal_date+', but your':'Your';
    const body=[
      'Dr. '+ln+',','',
      student.first_name+' '+student.last_name+', a doctoral student in the '+student.program_name+' program, needs a Graduate Faculty Representative for their dissertation advisory committee and your participation is requested.','',
      'You are receiving this request because you are now eligible to serve as a Graduate Faculty Representative with the changes made to the newly approved Graduate Committee Membership policy. (__12.99.99.c0.03-graduate-committee-membership__)','',
      'Below is some text regarding this responsibility that can provide some additional information.','',
      'The committee chair is '+(student.chair||'[Chair]')+(student.cochair?', Co-Chair is '+student.cochair:'')+', and the dissertation title is "'+(student.dissertation_title||'[Title]')+'"','',
      proposalLine+' response within __two business days__ would be greatly appreciated. Thank you, in advance, for considering this request. Please let me know if you have any questions!','','',
      'Doctoral Committee',
      "The student will choose a doctoral committee chair from among the regular graduate faculty members of the doctoral program. Doctoral committees will be composed of a minimum of four Texas A&M University-Corpus Christi graduate faculty members and will include the doctoral committee chair, two other graduate faculty members, and a Graduate Faculty Representative, selected from a different department or college/school. The Associate Provost will officially appoint the doctoral committee. All doctoral committee members representing the student's discipline may be required to review and approve degree plans and participate in qualifying examinations, proposal hearings, comprehensive and final examinations, including defense of dissertation, and all are required to sign relevant documents. More than one dissenting vote in the dissertation defense/final examination will constitute failure. The Graduate Faculty Representative will not be required to attend or evaluate materials related to the comprehensive examination.",'',
      'Graduate Faculty Representative',
      "The Graduate Faculty Representative helps ensure the quality of the graduate degree is appropriate for Texas A&M University-Corpus Christi and that students receive fair and reasonable treatment in their graduate experience. All committee members will be provided a copy of the proposal and the dissertation allowing for a two-week turnaround before the scheduled proposal and defense/final examination.",'',
      'Regards,','Sahith Reddy Vellenki.'
    ].join('\n');
    setEmailBody(body);
    setStep(3);
  };

  const openOutlook=()=>window.location.href='mailto:?subject='+encodeURIComponent('GFR Request – '+student.first_name+' '+student.last_name)+'&body='+encodeURIComponent(emailBody);

  const logRequest=async()=>{
    setSending(true);
    const req={
      gfr_id:String(selected.id),gfr_name:selected.name,gfr_college:selected.college,
      student_name:student.full_name,student_college:student.college_code,
      student_program:student.program_name||student.major,
      dissertation:student.dissertation_title||'',
      chair:student.chair||'',cochair:student.cochair||'',
      members:student.committee_members||'',
      grad_expected:student.anticipated_grad||'',
      email_body:emailBody,
      sent_at:new Date().toISOString(),
      deadline:new Date(Date.now()+48*3600000).toISOString(),
      status:'pending'
    };
    const saved=await addRequest(req);
    if(saved){
      // Also update the student's GFR field to show pending
      await updateStudent(student.id,{gfr:selected.name+' (pending)'});
      notify('GFR request sent to '+selected.name+' — 48hr clock started');
      onClose();
    }
    setSending(false);
  };

  const attempt=requests.filter(r=>r.student_name===student.full_name).length+1;

  return(
    <div className="modal-bg" style={{zIndex:600}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:800,maxHeight:'92vh',overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <div style={{background:'#1a1a2e',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#fff',fontWeight:600,fontSize:14}}>✉️ Send GFR Request</div>
            <div style={{color:'#94a3b8',fontSize:12,marginTop:2}}>{student.first_name} {student.last_name} · {student.program_name||student.major} · Attempt #{attempt}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#94a3b8',fontSize:20,cursor:'pointer'}}>×</button>
        </div>

        {/* Student summary */}
        <div style={{padding:'12px 20px',background:'#f8f7f4',borderBottom:'1px solid #e5e7eb',display:'flex',gap:24,flexWrap:'wrap',fontSize:12}}>
          {[['Chair',student.chair],['Co-Chair',student.cochair],['College',student.college_code],['Dissertation',student.dissertation_title]].filter(([,v])=>v).map(([k,v])=>(
            <div key={k}><span style={{color:'#9ca3af'}}>{k}: </span><strong style={{color:'#374151'}}>{v&&v.length>40?v.substring(0,40)+'…':v}</strong></div>
          ))}
        </div>

        <div style={{display:'flex',flex:1,overflow:'hidden'}}>
          {/* Left: steps */}
          <div style={{width:300,borderRight:'1px solid #e5e7eb',padding:16,overflowY:'auto'}}>
            {step===1&&(
              <div>
                <div style={{fontWeight:600,marginBottom:8,fontSize:13}}>Ready to find a GFR?</div>
                <div style={{fontSize:12,color:'#6b7280',marginBottom:16,lineHeight:1.6}}>
                  This will search for free faculty from a different college than <strong>{student.college_code}</strong>, excluding anyone already contacted for this student.
                </div>
                {student.gfr&&!student.gfr.includes('pending')&&(
                  <div style={{background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:8,padding:'8px 12px',marginBottom:12,fontSize:12,color:'#92400e'}}>
                    ⚠️ Current GFR: <strong>{student.gfr}</strong>. Sending a new request will replace this.
                  </div>
                )}
                <button className="btn btn-p" onClick={findCandidates} style={{width:'100%',justifyContent:'center'}}>Find Available GFRs →</button>
              </div>
            )}
            {step===2&&(
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{fontWeight:600,fontSize:13}}>Available GFRs <span style={{color:'#9ca3af',fontWeight:400}}>({candidates.length})</span></div>
                  <button className="btn btn-o btn-sm" onClick={findCandidates}>🔀 Reshuffle</button>
                </div>
                {candidates.length===0?<div style={{color:'#9ca3af',fontSize:12,textAlign:'center',padding:20}}>No eligible GFRs found.</div>:candidates.slice(0,8).map(gfr=>(
                  <div key={gfr.id} onClick={()=>selectCandidate(gfr)}
                    style={{border:'1.5px solid #e5e7eb',borderRadius:8,padding:'10px 12px',marginBottom:8,cursor:'pointer',transition:'all 0.12s'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='#059669';e.currentTarget.style.background='#f0fdf4';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='#e5e7eb';e.currentTarget.style.background='#fff';}}>
                    <div style={{fontWeight:500,fontSize:13}}>{gfr.name}{gfr.declineCount>0&&<span className="badge" style={{background:'#fee2e2',color:'#991b1b',marginLeft:4,fontSize:10}}>{gfr.declineCount}× declined</span>}</div>
                    <div style={{fontSize:11,color:'#6b7280'}}>{gfr.college} · {gfr.department}</div>
                  </div>
                ))}
              </div>
            )}
            {step===3&&selected&&(
              <div>
                <button className="btn btn-o btn-sm" onClick={()=>setStep(2)} style={{marginBottom:12}}>← Back</button>
                <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,padding:'10px 12px',marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:600,color:'#065f46'}}>Sending to: {selected.name}</div>
                  <div style={{fontSize:11,color:'#047857'}}>{selected.college} · {selected.department}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <button className="btn btn-b" onClick={openOutlook} style={{justifyContent:'center'}}>📧 Open in Outlook</button>
                  <button className="btn btn-o" onClick={()=>navigator.clipboard.writeText(emailBody).then(()=>notify('Copied!'))} style={{justifyContent:'center'}}>📋 Copy Email</button>
                  <button className="btn btn-g" onClick={logRequest} disabled={sending} style={{justifyContent:'center',opacity:sending?0.7:1}}>{sending?'Saving…':'✓ Log Request & Start 48hr Clock'}</button>
                </div>
              </div>
            )}
          </div>

          {/* Right: email preview */}
          <div style={{flex:1,display:'flex',flexDirection:'column'}}>
            <div style={{padding:'8px 14px',background:'#f8f7f4',borderBottom:'1px solid #e5e7eb',fontSize:11,color:'#9ca3af',textTransform:'uppercase'}}>
              Email Preview {step===3?'— edit if needed':''}
            </div>
            {emailBody?<textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)}
              style={{flex:1,padding:14,border:'none',fontSize:12,fontFamily:"'DM Mono','Courier New',monospace",lineHeight:1.7,resize:'none',color:'#374151'}}/>
              :<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#9ca3af',flexDirection:'column',gap:8}}><div style={{fontSize:24}}>✉️</div><div style={{fontSize:12}}>Select a GFR to preview the email</div></div>}
          </div>
        </div>
      </div>
    </div>
  );
}


// ── Committee Details Tab ─────────────────────────────────────────────────────
function CommitteeView({students,programs,updateStudent,addStudent,deleteStudent,gfrData,addRequest,requests,notify,facultyNames}){
  const [search,setSearch]=useState('');
  const [fProg,setFProg]=useState('All');
  const [fCollege,setFCollege]=useState('All');
  const [fGrad,setFGrad]=useState('All');
  const [expanded,setExpanded]=useState(null);
  const [showAddModal,setShowAddModal]=useState(false);
  const [gfrModal,setGfrModal]=useState(null); // {student, candidates, step, selected, emailBody}

  const progOpts=['All',...programs.map(p=>p.code)];
  const colleges=['All',...Object.keys(COLLEGE_MAP)];

  const filtered=useMemo(()=>students.filter(s=>{
    if(fProg!=='All'&&s.major!==fProg)return false;
    if(fCollege!=='All'&&s.college_code!==fCollege)return false;
    if(fGrad==='Active'&&s.defense_date)return false;
    if(fGrad==='Graduated'&&!s.defense_date)return false;
    if(search){
      const q=search.toLowerCase();
      return(s.first_name||'').toLowerCase().includes(q)||(s.last_name||'').toLowerCase().includes(q)||(s.chair||'').toLowerCase().includes(q)||(s.gfr||'').toLowerCase().includes(q)||(s.major||'').toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b)=>a.last_name.localeCompare(b.last_name)),[students,search,fProg,fCollege,fGrad]);

  // Live filtered stats
  const liveStats=useMemo(()=>{
    const pendingReqIds=new Set(requests.filter(r=>r.status==='pending').map(r=>r.student_name));
    const hasGfr=filtered.filter(s=>s.gfr&&s.gfr.trim()&&!s.gfr.toLowerCase().includes('(pending)')).length;
    return{
      total:filtered.length,
      needsGFR:filtered.filter(s=>!s.gfr||!s.gfr.trim()).length,
      hasGFR:hasGfr,
      pending:filtered.filter(s=>pendingReqIds.has(s.full_name)).length,
    };
  },[filtered,requests]);

  return(<div>
    {/* Stats + Filter row — sticky together below page header */}
    <div style={{position:'sticky',top:56,zIndex:80,background:'#f5f4f0',paddingTop:20,paddingBottom:12,marginBottom:4}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:10}}>
        {[['Showing',liveStats.total,'#1a1a2e','#fff','#fff'],['Needs GFR',liveStats.needsGFR,liveStats.needsGFR>0?'#fee2e2':'#f9fafb',liveStats.needsGFR>0?'#991b1b':'#6b7280','#ef4444'],['Has GFR',liveStats.hasGFR,'#d1fae5','#065f46','#059669'],['Pending Requests',liveStats.pending,liveStats.pending>0?'#dbeafe':'#f9fafb',liveStats.pending>0?'#1e3a8a':'#6b7280','#2563eb']].map(([label,val,bg,fg,accent])=>(
          <div key={label} style={{background:bg,color:fg,borderRadius:10,padding:'10px 16px',flex:1,minWidth:80,borderLeft:'3px solid '+accent}}>
            <div style={{fontSize:20,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{val}</div>
            <div style={{fontSize:11,opacity:0.75,marginTop:1}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search first name, last name, chair, GFR, program…" className="fi" style={{flex:1,minWidth:200}}/>
        <select value={fProg} onChange={e=>setFProg(e.target.value)} className="fi" style={{width:'auto'}}>
          {progOpts.map(p=><option key={p}>{p}</option>)}
        </select>
        <select value={fCollege} onChange={e=>setFCollege(e.target.value)} className="fi" style={{width:'auto'}}>
          {colleges.map(c=><option key={c}>{c}</option>)}
        </select>
        <select value={fGrad} onChange={e=>setFGrad(e.target.value)} className="fi" style={{width:'auto'}}>
          <option value="All">All Students</option>
          <option value="Active">Active Only</option>
          <option value="Graduated">Graduated</option>
        </select>
        <span style={{color:'#9ca3af',fontSize:12,whiteSpace:'nowrap'}}>{filtered.length} of {students.length}</span>
        <button className="btn btn-g btn-sm" onClick={()=>setShowAddModal(true)}>+ Add Student</button>
      </div>
    </div>

    <div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{background:'#f8f7f4',borderBottom:'1.5px solid #e5e7eb'}}>
          {['Last Name','First Name','Program','Degree','Chair','GFR','Ant. Grad','Defense',''].map(h=>(
            <th key={h} style={{padding:'9px 12px',textAlign:'left',fontWeight:600,color:'#374151',fontSize:12,whiteSpace:'nowrap'}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {filtered.map((s,i)=>{
            const isExp=expanded===s.id;
            const hasDefense=!!s.defense_date;
            return[
              <tr key={s.id} className="rh" onClick={()=>setExpanded(isExp?null:s.id)} style={{borderBottom:'1px solid #f3f4f6',cursor:'pointer',background:i%2===0?'#fff':'#fafafa',opacity:hasDefense?0.75:1}}>
                <td style={{padding:'9px 12px',fontWeight:500,fontSize:14}}>{s.last_name}</td>
                <td style={{padding:'9px 12px',fontSize:13}}>{s.first_name}</td>
                <td style={{padding:'9px 12px'}}><span style={{background:'#e5e7eb',color:'#374151',borderRadius:4,padding:'2px 7px',fontSize:11,fontFamily:"'DM Mono',monospace"}}>{s.major}</span></td>
                <td style={{padding:'9px 12px',fontSize:12,color:'#6b7280'}}>{s.degree}</td>
                <td style={{padding:'9px 12px',fontSize:13}}>{s.chair||'—'}</td>
                <td style={{padding:'9px 12px',fontSize:13}}>{s.gfr?<span style={{color:'#059669',fontWeight:500}}>{s.gfr}</span>:<span className="badge" style={{background:'#fee2e2',color:'#991b1b'}}>Needed</span>}</td>
                <td style={{padding:'9px 12px',fontSize:12,color:'#6b7280'}}>{s.anticipated_grad||'—'}</td>
                <td style={{padding:'9px 12px',fontSize:12}}>{s.defense_date?<span className="badge" style={{background:'#d1fae5',color:'#065f46'}}>✓ {s.defense_date}</span>:<span style={{color:'#d1d5db'}}>—</span>}</td>
                <td style={{padding:'6px 8px',color:'#9ca3af'}}>
                  {!s.gfr&&<button className="btn btn-g btn-sm" onClick={e=>{e.stopPropagation();setGfrModal({student:s});}} style={{fontSize:11,padding:'4px 8px'}}>Send GFR →</button>}
                  {s.gfr&&!s.gfr.includes('pending')&&<button className="btn btn-o btn-sm" onClick={e=>{e.stopPropagation();setGfrModal({student:s});}} style={{fontSize:11,padding:'4px 8px'}}>↻ New GFR</button>}
                  <span style={{marginLeft:4}}>{isExp?'▲':'▼'}</span>
                </td>
              </tr>,
              isExp&&(<tr key={s.id+'_e'} style={{borderBottom:'1px solid #e5e7eb'}}><td colSpan={9} style={{padding:'16px 20px',background:'#f8f7f4'}}>
                <StudentDetail student={s} updateStudent={updateStudent} deleteStudent={deleteStudent} programs={programs} notify={notify} onClose={()=>setExpanded(null)} facultyNames={facultyNames}/>
              </td></tr>)
            ];
          })}
        </tbody>
      </table>
      {filtered.length===0&&<div style={{textAlign:'center',padding:40,color:'#9ca3af'}}>No students found</div>}
    </div>

    {showAddModal&&<AddStudentModal programs={programs} onClose={()=>setShowAddModal(false)} onSave={async s=>{await addStudent(s);setShowAddModal(false);}} facultyNames={facultyNames}/>}
    {gfrModal&&<GFRRequestModal
      student={gfrModal.student}
      gfrData={gfrData}
      requests={requests}
      addRequest={addRequest}
      updateStudent={updateStudent}
      notify={notify}
      onClose={()=>setGfrModal(null)}
    />}
  </div>);
}

// ── Student Detail ────────────────────────────────────────────────────────────
function StudentDetail({student:s,updateStudent,deleteStudent,programs,notify,onClose,facultyNames}){
  const [editing,setEditing]=useState(false);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({...s});
  const f=k=>v=>{
    const updated={...form,[k]:v};
    // Auto-fill when program changes
    if(k==='major'){
      const prog=programs.find(p=>p.code===v);
      if(prog){updated.program_name=prog.name;updated.college_code=prog.college_code;updated.college_name=prog.college_name;updated.department=prog.department;updated.coordinator=prog.coordinator;updated.dept_chair='';}
    }
    setForm(updated);
  };
  const progOpts=programs.map(p=>({value:p.code,label:p.name+' ('+p.code+')'}));
  const save=async()=>{setSaving(true);await updateStudent(s.id,form);setSaving(false);setEditing(false);notify('Updated '+s.full_name);};

  const FORM_FIELDS=[
    {key:'form_a',label:'Form A — Degree Plan Received'},
    {key:'form_b',label:'Form B — Comprehensive Exam'},
    {key:'candidacy_letter_date',label:'Candidacy Letter Date'},
    {key:'form_c',label:'Form C — Committee Appt'},
    {key:'assign_new_gfr',label:'C2 — Assign New GFR'},
    {key:'proposal_date',label:'Proposal Hearing Date'},
    {key:'form_d',label:'Form D — Proposal Hearing Request'},
    {key:'form_e',label:'Form E — Agreement to Schedule Defense'},
    {key:'defense_date',label:'Defense Date'},
    {key:'form_f',label:'Form F — Defense & Exam Report'},
    {key:'form_g',label:'Form G — GFR Form Rec Date'},
    {key:'form_h',label:'Form H — Committee Member Change'},
    {key:'form_k',label:'Form K — Leave of Absence'},
    {key:'survey_earned_doctorates',label:'Survey of Earned Doctorates'},
    {key:'enrollment_notification',label:'Enrollment Notification Sent'},
    {key:'gfr_letter_date',label:'GFR Letter Sent Date'},
  ];

  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
      <div>
        <div style={{fontWeight:700,fontSize:16}}>{s.first_name} {s.last_name}</div>
        <div style={{fontSize:12,color:'#6b7280'}}>{s.student_id} · {s.email}</div>
      </div>
      <div style={{display:'flex',gap:8}}>
        {!editing&&<button className="btn btn-o btn-sm" onClick={()=>setEditing(true)}>✏️ Edit</button>}
        {!editing&&<button className="btn btn-r btn-sm" onClick={()=>deleteStudent(s.id,s.full_name)}>🗑 Delete</button>}
        {!editing&&<button className="btn btn-o btn-sm" onClick={onClose}>Close</button>}
      </div>
    </div>

    {editing?(
      <div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:12}}>
          <Field label="First Name" value={form.first_name} onChange={f('first_name')}/>
          <Field label="Last Name" value={form.last_name} onChange={f('last_name')}/>
          <Field label="Student ID" value={form.student_id} onChange={f('student_id')} placeholder="e.g. A04123456"/>
          <Field label="Email" value={form.email} onChange={f('email')} placeholder="e.g. jsmith@islander.tamucc.edu"/>
          <div><label className="fl">Degree (set by program)</label><span className="fa">{form.degree||PROGRAM_DEGREE_MAP[form.major]||'PHD'}</span></div>
          <Field label="Program" value={form.major} onChange={f('major')} options={progOpts}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:12}}>
          <div><label className="fl">College (auto)</label><span className="fa">{form.college_code} — {form.college_name||COLLEGE_MAP[form.college_code]||''}</span></div>
          <div><label className="fl">Department (auto)</label><span className="fa">{form.department||'—'}</span></div>
          <div><label className="fl">Coordinator (auto)</label><span className="fa">{form.coordinator||'—'}</span></div>
          <div><label className="fl">Dept Chair (auto)</label><span className="fa">{form.dept_chair||'—'}</span></div>
          <div><label className="fl">Academic Advisor (auto)</label><span className="fa">{form.academic_advisor||'—'}</span></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:12}}>
          <Field label="Committee Chair" value={form.chair} onChange={f('chair')} placeholder="e.g. Rosie Banda" autoList={facultyNames}/>
          <Field label="Co-Chair (optional)" value={form.cochair} onChange={f('cochair')} placeholder="e.g. Jane Smith" autoList={facultyNames}/>
          <Field label="Committee Members" value={form.committee_members} onChange={f('committee_members')} placeholder="Type to search faculty…" autoList={facultyNames} multiMax={3}/>
          <Field label="GFR (Graduate Faculty Rep)" value={form.gfr} onChange={f('gfr')} placeholder="Leave blank to assign later" autoList={facultyNames}/>
          <Field label="External Member" value={form.external_member} onChange={f('external_member')} autoList={facultyNames}/>
          <Field label="Anticipated Graduation" value={form.anticipated_grad} onChange={f('anticipated_grad')} placeholder="e.g. Spring 2026"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr',gap:12,marginBottom:12}}>
          <Field label="Dissertation Title" value={form.dissertation_title} onChange={f('dissertation_title')} rows={2} placeholder="Full dissertation or project title"/>
          <Field label="Comments / Notes" value={form.comments} onChange={f('comments')} rows={2} placeholder="Any additional notes…"/>
        </div>
        <div className="section-hdr">Forms & Tracking Dates</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
          {FORM_FIELDS.map(({key,label})=><Field key={key} label={label} value={form[key]} onChange={f(key)}/>)}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-g" onClick={save} disabled={saving} style={{justifyContent:'center',opacity:saving?0.7:1}}>{saving?'Saving…':'Save Changes'}</button>
          <button className="btn btn-o" onClick={()=>setEditing(false)} style={{justifyContent:'center'}}>Cancel</button>
        </div>
      </div>
    ):(
      <div>
        {/* Academic Info */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:12}}>
          {[['Program',s.program_name||s.major],['Degree',s.degree],['Entry Date',s.entry_date],['Anticipated Graduation',s.anticipated_grad],['College',s.college_code+' — '+(s.college_name||COLLEGE_MAP[s.college_code]||'')],['Department',s.department],['Coordinator',s.coordinator],['Dept Chair',s.dept_chair],['Academic Advisor',s.academic_advisor]].map(([k,v])=>(
            <div key={k}><div style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{k}</div><div style={{fontSize:13,fontWeight:k==='Coordinator'||k==='Dept Chair'?500:400}}>{v||'—'}</div></div>
          ))}
        </div>
        {/* Committee */}
        <div className="section-hdr">Committee</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:12}}>
          {[['Chair',s.chair],['Co-Chair',s.cochair],['Committee Members',s.committee_members],['GFR',s.gfr],['External Member',s.external_member],['GFR Letter Date',s.gfr_letter_date]].map(([k,v])=>(
            <div key={k}><div style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{k}</div><div style={{fontSize:13,color:k==='GFR'&&v?'#059669':'#374151',fontWeight:k==='GFR'&&v?500:400}}>{v||'—'}</div></div>
          ))}
        </div>
        {/* Dissertation */}
        {s.dissertation_title&&<div style={{background:'#f8f7f4',borderRadius:8,padding:'10px 14px',marginBottom:12}}><div style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>Dissertation Title</div><div style={{fontSize:13,color:'#374151',lineHeight:1.6,fontStyle:'italic'}}>"{s.dissertation_title}"</div></div>}
        {/* Forms */}
        <div className="section-hdr">Forms & Tracking Dates</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:12}}>
          {FORM_FIELDS.map(({key,label})=>(
            <div key={key}><div style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{label}</div><div style={{fontSize:12,color:s[key]?'#059669':'#d1d5db'}}>{s[key]||'Not received'}</div></div>
          ))}
        </div>
        {/* Defense */}
        <div className="section-hdr">Defense & Completion</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {[['Defense Date',s.defense_date],['Proposal Date',s.proposal_date],['Comments',s.comments],['Concentration',s.concentration],['Catalog Year',s.catalog_year],['Last Term',s.last_term]].map(([k,v])=>(
            <div key={k}><div style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{k}</div><div style={{fontSize:13}}>{v||'—'}</div></div>
          ))}
        </div>
      </div>
    )}
  </div>);
}

// ── Add Student Modal ─────────────────────────────────────────────────────────
function AddStudentModal({programs,onClose,onSave,facultyNames}){
  const [form,setForm]=useState({first_name:'',last_name:'',student_id:'',email:'',degree:'PHD',major:'',chair:'',cochair:'',committee_members:'',gfr:'',dissertation_title:'',anticipated_grad:'',comments:''});
  const [autoFill,setAutoFill]=useState({college_code:'',college_name:'',department:'',coordinator:'',dept_chair:'',academic_advisor:''});
  const [saving,setSaving]=useState(false);
  const f=k=>v=>{
    const updated={...form,[k]:v};
    if(k==='major'){
      const prog=programs.find(p=>p.code===v);
      if(prog){
        const advisor=lookupAdvisor(prog.college_code,updated.last_name||'');
        const degree=PROGRAM_DEGREE_MAP[v]||'PHD';
        setAutoFill({college_code:prog.college_code,college_name:prog.college_name,department:prog.department,coordinator:prog.coordinator,dept_chair:'',academic_advisor:advisor,degree:degree});
        updated.degree=degree;
      }
    }
    if(k==='last_name'&&autoFill.college_code){
      setAutoFill(prev=>({...prev,academic_advisor:lookupAdvisor(prev.college_code,v)}));
    }
    setForm(updated);
  };
  const progOpts=programs.map(p=>({value:p.code,label:p.name+' ('+p.code+')'}));
  const save=async()=>{
    if(!form.first_name||!form.last_name){alert('First and last name required');return;}
    setSaving(true);
    const full={...form,...autoFill,full_name:form.last_name+', '+form.first_name,degree:autoFill.degree||form.degree||'PHD'};
    await onSave(full);setSaving(false);
  };
  return(<div className="modal-bg">
    <div className="modal" style={{maxWidth:600,maxHeight:'92vh',overflowY:'auto'}}>
      <div style={{padding:'16px 24px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff',zIndex:1}}>
        <h2 style={{fontSize:15,fontWeight:600}}>Add New Student</h2>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#9ca3af'}}>×</button>
      </div>
      <div style={{padding:'16px 24px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:4}}>
          <Field label="First Name *" value={form.first_name} onChange={f('first_name')} placeholder="e.g. John"/>
          <Field label="Last Name *" value={form.last_name} onChange={f('last_name')} placeholder="e.g. Smith"/>
          <Field label="Student ID" value={form.student_id} onChange={f('student_id')} placeholder="e.g. A04123456"/>
          <Field label="Email" value={form.email} onChange={f('email')} placeholder="e.g. jsmith@islander.tamucc.edu"/>
          <Field label="Program *" value={form.major} onChange={f('major')} options={progOpts}/>
        </div>
        {autoFill.college_code&&<div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:12}}>
          <div style={{fontWeight:500,color:'#065f46',marginBottom:4}}>Auto-filled from program:</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,color:'#374151'}}>
            {[['Degree',autoFill.degree||'PHD'],['College',autoFill.college_code+' — '+autoFill.college_name],['Department',autoFill.department],['Coordinator',autoFill.coordinator],['Academic Advisor',autoFill.academic_advisor]].map(([k,v])=>(
              <div key={k}><span style={{color:'#6b7280'}}>{k}: </span><strong>{v||'—'}</strong></div>
            ))}
          </div>
        </div>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:4}}>
          <Field label="Committee Chair" value={form.chair} onChange={f('chair')} placeholder="e.g. Rosie Banda" autoList={facultyNames}/>
          <Field label="Co-Chair (optional)" value={form.cochair} onChange={f('cochair')} placeholder="e.g. Jane Smith" autoList={facultyNames}/>
          <Field label="Committee Members" value={form.committee_members} onChange={f('committee_members')} placeholder="Type to search faculty…" autoList={facultyNames} multiMax={3}/>
          <Field label="GFR (Graduate Faculty Rep)" value={form.gfr} onChange={f('gfr')} placeholder="Leave blank to assign later" autoList={facultyNames}/>
          <Field label="Anticipated Graduation" value={form.anticipated_grad} onChange={f('anticipated_grad')} placeholder="e.g. Spring 2026"/>
        </div>
        <Field label="Dissertation Title" value={form.dissertation_title} onChange={f('dissertation_title')} rows={2} placeholder="Full dissertation or project title"/>
        <div style={{height:10}}/>
        <Field label="Comments / Notes" value={form.comments} onChange={f('comments')} rows={2} placeholder="Any additional notes…"/>
        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button className="btn btn-g" onClick={save} disabled={saving} style={{flex:1,justifyContent:'center',opacity:saving?0.7:1}}>{saving?'Saving…':'Save Student'}</button>
          <button className="btn btn-o" onClick={onClose} style={{flex:1,justifyContent:'center'}}>Cancel</button>
        </div>
      </div>
    </div>
  </div>);
}

// ── Settings Tab ──────────────────────────────────────────────────────────────
function SettingsView({programs,departments,advisors,faculty,updateProgram,updateDepartment,updateAdvisor,addFaculty,updateFaculty,deleteFaculty,seedTable,notify}){

  const [editingId,setEditingId]=useState(null);

  const [addForm,setAddForm]=useState({});

  const af=k=>v=>setAddForm(p=>({...p,[k]:v}));

  const startEdit=(item)=>{setEditingId(item.id);setShowAddRow(false);const {id,created_at,...rest}=item;setEditForm(rest);};
  const cancelEdit=()=>{setEditingId(null);setEditForm({});};
  const startAdd=()=>{setShowAddRow(true);setEditingId(null);setAddForm({});};

  const saveNewProgram=async()=>{
    if(!addForm.code||!addForm.name){notify('Code and name required','error');return;}
    try{await sbPost('programs',[{code:addForm.code,name:addForm.name,college_code:addForm.college_code||'',college_name:COLLEGE_MAP[addForm.college_code]||'',department:addForm.department||'',coordinator:addForm.coordinator||''}]);
    notify('Program added');setShowAddRow(false);window.location.reload();}
    catch(e){notify('Add failed: '+e.message,'error');}
  };
  const saveNewDept=async()=>{
    if(!addForm.name){notify('Name required','error');return;}
    try{await sbPost('departments',[{name:addForm.name,college_code:addForm.college_code||'',chair:addForm.chair||''}]);
    notify('Department added');setShowAddRow(false);window.location.reload();}
    catch(e){notify('Add failed: '+e.message,'error');}
  };
  const saveNewAdvisor=async()=>{
    if(!addForm.advisor_name){notify('Advisor name required','error');return;}

    notify('Advisor added');setShowAddRow(false);window.location.reload();}
    catch(e){notify('Add failed: '+e.message,'error');}

  const deleteRow=async(table,id,name)=>{
    if(!window.confirm('Delete "'+name+'"? This cannot be undone.'))return;

        <button key={s} onClick={()=>setSection(s)} className="btn" style={{background:section===s?'#1a1a2e':'#fff',color:section===s?'#fff':'#374151',border:'1.5px solid '+(section===s?'#1a1a2e':'#e5e7eb')}}>
          {label}

    </div>

    {section==='programs'&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',overflow:'hidden'}}>

        <span>Editing a coordinator cascades to all students in that program.</span>
        <button className="btn btn-g btn-sm" onClick={startAdd}>+ Add Program</button>
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{background:'#f8f7f4',borderBottom:'1.5px solid #e5e7eb'}}>
          {['Code','Program Name','College','Department','Coordinator',''].map(h=><th key={h} style={{padding:'9px 14px',textAlign:'left',fontWeight:600,fontSize:12}}>{h}</th>)}
        </tr></thead>
        <tbody>
          {programs.map(p=>(
            <tr key={p.id} style={{borderBottom:'1px solid #f3f4f6'}}>
              {editingId===p.id?(<>
                <td style={{padding:'8px 14px'}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:12}}>{p.code}</span></td>
                <td style={{padding:'8px 14px'}}><input className="fi" value={editForm.name||''} onChange={e=>ef('name')(e.target.value)} style={{width:'100%'}}/></td>
                <td style={{padding:'8px 14px'}}><select className="fi" value={editForm.college_code||''} onChange={e=>ef('college_code')(e.target.value)}>{Object.keys(COLLEGE_MAP).map(c=><option key={c} value={c}>{c}</option>)}</select></td>
                <td style={{padding:'8px 14px'}}><input className="fi" value={editForm.department||''} onChange={e=>ef('department')(e.target.value)} style={{width:'100%'}}/></td>
                <td style={{padding:'8px 14px'}}><input className="fi" value={editForm.coordinator||''} onChange={e=>ef('coordinator')(e.target.value)} style={{width:'100%'}}/></td>
                <td style={{padding:'8px 14px'}}><div style={{display:'flex',gap:6}}>
                  <button className="btn btn-g btn-sm" onClick={async()=>{await updateProgram(p.id,editForm);setEditingId(null);}}>Save</button>
                  <button className="btn btn-o btn-sm" onClick={cancelEdit}>Cancel</button>
                </div></td>
              </>):(<>
                <td style={{padding:'9px 14px',fontFamily:"'DM Mono',monospace",fontSize:12}}>{p.code}</td>
                <td style={{padding:'9px 14px',fontWeight:500}}>{p.name}</td>
                <td style={{padding:'9px 14px',color:'#6b7280'}}>{p.college_code}</td>

                <td style={{padding:'9px 14px'}}><div style={{display:'flex',gap:4}}><button className="btn btn-o btn-sm" onClick={()=>startEdit(p)}>✏️ Edit</button><button className="btn btn-r btn-sm" onClick={()=>deleteRow('programs',p.id,p.name)}>🗑</button></div></td>

            <td style={{padding:'8px 14px'}}><input className="fi" value={addForm.name||''} onChange={e=>af('name')(e.target.value)} placeholder="Program name"/></td>
            <td style={{padding:'8px 14px'}}><select className="fi" value={addForm.college_code||''} onChange={e=>af('college_code')(e.target.value)}><option value="">— college —</option>{Object.keys(COLLEGE_MAP).map(c=><option key={c} value={c}>{c}</option>)}</select></td>
            <td style={{padding:'8px 14px'}}><input className="fi" value={addForm.department||''} onChange={e=>af('department')(e.target.value)} placeholder="Department"/></td>
            <td style={{padding:'8px 14px'}}><input className="fi" value={addForm.coordinator||''} onChange={e=>af('coordinator')(e.target.value)} placeholder="Coordinator name"/></td>
            <td style={{padding:'8px 14px'}}><div style={{display:'flex',gap:6}}><button className="btn btn-g btn-sm" onClick={saveNewProgram}>Save</button><button className="btn btn-o btn-sm" onClick={()=>setShowAddRow(false)}>Cancel</button></div></td>
          </tr>}
        </tbody>
      </table>
    </div>}

    {section==='departments'&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',overflow:'hidden'}}>
      <div style={{padding:'12px 16px',background:'#f8f7f4',borderBottom:'1px solid #e5e7eb',fontSize:12,color:'#6b7280',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>Editing a chair cascades to all students in that department.</span>
        <button className="btn btn-g btn-sm" onClick={startAdd}>+ Add Department</button>
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{background:'#f8f7f4',borderBottom:'1.5px solid #e5e7eb'}}>
          {['Department','College','Chair',''].map(h=><th key={h} style={{padding:'9px 14px',textAlign:'left',fontWeight:600,fontSize:12}}>{h}</th>)}
        </tr></thead>
        <tbody>
          {departments.map(d=>(
            <tr key={d.id} style={{borderBottom:'1px solid #f3f4f6'}}>
              {editingId===d.id?(<>
                <td style={{padding:'8px 14px'}}><input className="fi" value={editForm.name||''} onChange={e=>ef('name')(e.target.value)} style={{width:'100%'}}/></td>
                <td style={{padding:'8px 14px'}}><select className="fi" value={editForm.college_code||''} onChange={e=>ef('college_code')(e.target.value)}>{Object.keys(COLLEGE_MAP).map(c=><option key={c} value={c}>{c}</option>)}</select></td>
                <td style={{padding:'8px 14px'}}><input className="fi" value={editForm.chair||''} onChange={e=>ef('chair')(e.target.value)} style={{width:'100%'}}/></td>
                <td style={{padding:'8px 14px'}}><div style={{display:'flex',gap:6}}>
                  <button className="btn btn-g btn-sm" onClick={async()=>{await updateDepartment(d.id,editForm);setEditingId(null);}}>Save</button>
                  <button className="btn btn-o btn-sm" onClick={cancelEdit}>Cancel</button>
                </div></td>
              </>):(<>
                <td style={{padding:'9px 14px',fontWeight:500}}>{d.name}</td>
                <td style={{padding:'9px 14px',color:'#6b7280'}}>{d.college_code}</td>
                <td style={{padding:'9px 14px',color:'#059669',fontWeight:500}}>{d.chair}</td>
                <td style={{padding:'9px 14px'}}><div style={{display:'flex',gap:4}}><button className="btn btn-o btn-sm" onClick={()=>startEdit(d)}>✏️ Edit</button><button className="btn btn-r btn-sm" onClick={()=>deleteRow('departments',d.id,d.name)}>🗑</button></div></td>
              </>)}
            </tr>
          ))}
          {showAddRow&&<tr style={{borderBottom:'1px solid #e5e7eb',background:'#f0fdf4'}}>
            <td style={{padding:'8px 14px'}}><input className="fi" value={addForm.name||''} onChange={e=>af('name')(e.target.value)} placeholder="Department name"/></td>
            <td style={{padding:'8px 14px'}}><select className="fi" value={addForm.college_code||''} onChange={e=>af('college_code')(e.target.value)}><option value="">— college —</option>{Object.keys(COLLEGE_MAP).map(c=><option key={c} value={c}>{c}</option>)}</select></td>
            <td style={{padding:'8px 14px'}}><input className="fi" value={addForm.chair||''} onChange={e=>af('chair')(e.target.value)} placeholder="Chair name"/></td>

          </tr>}
        </tbody>
      </table>
    </div>}

    {section==='advisors'&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',overflow:'hidden'}}>
      <div style={{padding:'12px 16px',background:'#f8f7f4',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:'#6b7280'}}>Graduate advisors only. Assigned automatically by last name range.</span>
        <button className="btn btn-g btn-sm" onClick={startAdd}>+ Add Advisor</button>

      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>

              {editingId===a.id?(<>
                <td style={{padding:'8px 14px'}}><select className="fi" value={editForm.college_code||''} onChange={e=>ef('college_code')(e.target.value)}>{Object.keys(COLLEGE_MAP).map(c=><option key={c} value={c}>{c}</option>)}</select></td>

            <td style={{padding:'8px 14px'}}><div style={{display:'flex',gap:4,alignItems:'center'}}><input className="fi" value={addForm.last_name_start||''} onChange={e=>af('last_name_start')(e.target.value)} placeholder="A" style={{width:50}}/><span>—</span><input className="fi" value={addForm.last_name_end||''} onChange={e=>af('last_name_end')(e.target.value)} placeholder="Z" style={{width:50}}/></div></td>

              <td style={{padding:'8px 14px'}}><select className="fi" value={addForm.college_code||''} onChange={e=>af('college_code')(e.target.value)}><option value="">—</option>{Object.keys(COLLEGE_MAP).map(c=><option key={c} value={c}>{c}</option>)}</select></td>
              <td style={{padding:'8px 14px'}}><input className="fi" value={addForm.title||''} onChange={e=>af('title')(e.target.value)} placeholder="Title"/></td>
              <td style={{padding:'8px 14px'}}><label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}><input type="checkbox" checked={!!addForm.is_gfr_eligible} onChange={e=>af('is_gfr_eligible')(e.target.checked)}/><span style={{fontSize:12}}>Yes</span></label></td>
              <td style={{padding:'8px 14px'}}><div style={{display:'flex',gap:6}}>

                <button className="btn btn-o btn-sm" onClick={()=>setShowAddRow(false)}>Cancel</button>
              </div></td>

            {faculty.filter(fac=>{
              if(facCollege!=='All'&&fac.college_code!==facCollege)return false;
              if(facSearch){const q=facSearch.toLowerCase();return(fac.name||'').toLowerCase().includes(q)||(fac.department||'').toLowerCase().includes(q)||(fac.college_code||'').toLowerCase().includes(q);}

                  <td style={{padding:'8px 14px'}}><input className="fi" value={editForm.name||''} onChange={e=>ef('name')(e.target.value)}/></td>

                  <td style={{padding:'8px 14px'}}><select className="fi" value={editForm.college_code||''} onChange={e=>ef('college_code')(e.target.value)}><option value="">—</option>{Object.keys(COLLEGE_MAP).map(c=><option key={c} value={c}>{c}</option>)}</select></td>

                    <button className="btn btn-o btn-sm" onClick={cancelEdit}>Cancel</button>
                  </div></td>
                </>):(<>
                  <td style={{padding:'9px 14px',fontWeight:500}}>{fac.name}</td>
                  <td style={{padding:'9px 14px',color:'#6b7280',fontSize:12}}>{fac.department||'—'}</td>
                  <td style={{padding:'9px 14px'}}>{fac.college_code?<span style={{background:'#e5e7eb',borderRadius:4,padding:'2px 7px',fontSize:11,fontFamily:"'DM Mono',monospace"}}>{fac.college_code}</span>:'—'}</td>
                  <td style={{padding:'9px 14px',color:'#9ca3af',fontSize:12}}>{fac.title||'—'}</td>
                  <td style={{padding:'9px 14px'}}>{fac.is_gfr_eligible?<span className="badge" style={{background:'#d1fae5',color:'#065f46'}}>✓ GFR</span>:<span style={{color:'#d1d5db'}}>—</span>}</td>
                  <td style={{padding:'9px 14px'}}><div style={{display:'flex',gap:4}}>
                    <button className="btn btn-o btn-sm" onClick={()=>startEdit(fac)}>✏️</button>
                    <button className="btn btn-r btn-sm" onClick={()=>deleteFaculty(fac.id,fac.name)}>🗑</button>
                  </div></td>
                </>)}
              </tr>
            ))}
          </tbody>
        </table>
        {faculty.length===0&&<div style={{textAlign:'center',padding:40,color:'#9ca3af'}}>No faculty loaded yet. Click "Load Faculty Data" above.</div>}
      </div>
    </div>}
  </div>);
}

// ── Trash / Deletion Log ──────────────────────────────────────────────────────
function TrashView({deletionLog,restoreEntry,notify}){
  const [search,setSearch]=useState('');
  const [fType,setFType]=useState('all');
  const [showRestored,setShowRestored]=useState(false);

  const filtered=useMemo(()=>deletionLog.filter(l=>{
    if(!showRestored&&l.restored_at)return false;
    if(fType!=='all'&&l.entity_type!==fType)return false;
    if(search){const q=search.toLowerCase();return(l.entity_name||'').toLowerCase().includes(q)||(l.notes||'').toLowerCase().includes(q)||(l.entity_type||'').toLowerCase().includes(q);}
    return true;
  }),[deletionLog,search,fType,showRestored]);

  return(<div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search deleted items…" className="fi" style={{flex:1,minWidth:200}}/>
      <select value={fType} onChange={e=>setFType(e.target.value)} className="fi" style={{width:'auto'}}>
        <option value="all">All Types</option>
        <option value="student">Students</option>
        <option value="gfr">GFR Faculty</option>
        <option value="faculty">Faculty</option>
      </select>
      <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#6b7280',cursor:'pointer'}}>
        <input type="checkbox" checked={showRestored} onChange={e=>setShowRestored(e.target.checked)}/>
        Show restored
      </label>
      <span style={{color:'#9ca3af',fontSize:12}}>{filtered.length} entries</span>
    </div>

    {filtered.length===0&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #e5e7eb',padding:40,textAlign:'center',color:'#9ca3af'}}><div style={{fontSize:28,marginBottom:8}}>🗑</div>No deleted items found</div>}

    {filtered.map((l,i)=>{
      const isRestored=!!l.restored_at;
      const typeColors={student:{bg:'#dbeafe',color:'#1e3a8a'},gfr:{bg:'#fef3c7',color:'#92400e'},faculty:{bg:'#f3e8ff',color:'#6b21a8'}};
      const tc=typeColors[l.entity_type]||{bg:'#f3f4f6',color:'#374151'};
      return(
        <div key={l.id||i} style={{background:'#fff',borderRadius:10,border:'1px solid '+(isRestored?'#d1fae5':'#e5e7eb'),padding:'14px 18px',marginBottom:8,opacity:isRestored?0.6:1}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
                <span className="badge" style={{background:tc.bg,color:tc.color}}>{l.entity_type}</span>
                <span style={{fontWeight:600,fontSize:14}}>{l.entity_name}</span>
                {isRestored&&<span className="badge" style={{background:'#d1fae5',color:'#065f46'}}>✓ Restored</span>}
              </div>
              {l.notes&&<div style={{fontSize:12,color:'#6b7280',marginBottom:4}}>Notes: {l.notes}</div>}
              <div style={{fontSize:11,color:'#9ca3af'}}>Deleted: {l.deleted_at?new Date(l.deleted_at).toLocaleString():'—'}{l.restored_at?' · Restored: '+new Date(l.restored_at).toLocaleString():''}</div>
            </div>
            {!isRestored&&<button className="btn btn-g btn-sm" onClick={()=>restoreEntry(l)}>↩ Restore</button>}
          </div>
          {l.entity_data&&Object.keys(l.entity_data).length>0&&(
            <details style={{marginTop:8}}>
              <summary style={{fontSize:11,color:'#9ca3af',cursor:'pointer'}}>View saved data</summary>
              <pre style={{fontSize:10,color:'#374151',background:'#f8f7f4',borderRadius:6,padding:8,marginTop:4,maxHeight:120,overflow:'auto',whiteSpace:'pre-wrap',fontFamily:"'DM Mono',monospace"}}>{JSON.stringify(l.entity_data,null,2)}</pre>
            </details>
          )}
        </div>
      );
    })}
  </div>);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
